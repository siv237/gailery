<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gailery - Галерея</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #0d1117; color: #c9d1d9; }
        h1 { padding: 14px 20px; background: #161b22; border-bottom: 1px solid #30363d; font-size: 16px; color: #58a6ff; display: flex; align-items: center; justify-content: space-between; position: relative; }
        h1 .nav { font-size: 13px; padding-right: 50px; }
        h1 .nav a { color: #6e7681; text-decoration: none; margin-left: 14px; }
        h1 .nav a:hover { color: #58a6ff; }
        h1 .nav a.active { color: #58a6ff; }
        h1 .theme-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-55%); background: none; border: none; cursor: pointer; color: #e3b341; font-size: 24px; padding: 8px 12px; display: flex; align-items: center; justify-content: center; z-index: 10; }
        h1 .theme-toggle:hover { background: rgba(255,255,255,.08); }

        .search-bar { padding: 10px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .search-bar input[type="text"] { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; padding: 6px 10px; font-family: monospace; font-size: 13px; flex: 1; min-width: 200px; }
        .search-bar input[type="text"]:focus { outline: none; border-color: #58a6ff; }
        .search-bar select { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; padding: 5px 8px; font-family: monospace; font-size: 12px; }
        .search-bar select:focus { outline: none; border-color: #58a6ff; }
        .search-bar button { background: #238636; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .search-bar button:hover { background: #2ea043; }
        .search-bar .btn-secondary { background: #21262d; color: #c9d1d9; }
        .search-bar .btn-secondary:hover { background: #30363d; }
        .search-bar label { color: #8b949e; font-size: 11px; display: flex; align-items: center; gap: 4px; }
        .search-bar label input[type="checkbox"] { accent-color: #238636; }

        .timeline { padding: 0 20px 0; background: #0d1117; border-bottom: 1px solid #21262d; display: flex; gap: 2px; overflow-x: auto; font-size: 11px; position: sticky; z-index: 17; transition: top .2s; width: 100%; justify-content: space-between; cursor: pointer; padding-top: 2px; padding-bottom: 18px; }

        .header-sticky { position: sticky; top: 0; z-index: 20; background: #161b22; transition: transform .2s; }
        .header-sticky h1 { margin: 0; display: flex; align-items: center; }
        .header-sticky h1 .logo { height: 32px; width: auto; margin-right: 6px; }
        .tl-bar { padding: 2px 8px; border-radius: 3px; color: #484f58; white-space: nowrap; min-width: 32px; text-align: center; position: relative; }
        .tl-bar:hover { color: #8b949e; }
        .tl-needle { position: absolute; bottom: 0; transform: translateX(-50%); z-index: 2; pointer-events: none; transition: left .4s ease-out; filter: drop-shadow(0 0 4px rgba(218,54,51,.6)); display: flex; flex-direction: column; align-items: center; }
        .tl-needle-arrow { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 10px solid #da3633; }
        .tl-needle-flag { background: #da3633; color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 2px; white-space: nowrap; margin-top: 1px; text-align: center; }

        .info-bar { padding: 6px 20px; background: #0d1117; border-bottom: 1px solid #21262d; font-size: 11px; color: #8b949e; display: flex; justify-content: space-between; align-items: center; }
        .info-bar b { color: #c9d1d9; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px; padding: 10px 20px; }
        .month-divider { grid-column: 1 / -1; padding: 6px 0 2px 2px; font-size: 12px; font-weight: 600; color: #8b949e; border-bottom: 1px solid #21262d; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
        .month-divider .md-year { color: #58a6ff; font-size: 13px; }
        .month-divider .md-month { color: #c9d1d9; }
        .card { background: #161b22; border-radius: 4px; overflow: hidden; cursor: pointer; position: relative; transition: transform .15s; }
        .card:hover { transform: scale(1.02); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #21262d; }
        .card .overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 6px 8px; background: linear-gradient(transparent, rgba(0,0,0,.85)); font-size: 10px; line-height: 1.4; }
        .card .overlay .date { color: #8b949e; }
        .card .overlay .desc { color: #c9d1d9; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .card .overlay .faces { display: flex; gap: 3px; margin-top: 3px; }
        .card .face-thumb { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 1px solid #30363d; }
        .card .face-thumb.named { border-color: #3fb950; }
        .card .badge { position: absolute; left: 4px; background: rgba(0,0,0,.7); color: #3fb950; font-size: 9px; padding: 2px 5px; border-radius: 3px; }
        .card .badge.badge-rel { top: 4px; }
        .card .badge.badge-faces { top: 22px; }
        .card .badge.badge-only { top: 4px; }
        .card .del-mark { position: absolute; bottom: 4px; right: 4px; width: 22px; height: 22px; background: rgba(0,0,0,.5); color: #8b949e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 2; opacity: 0; transition: opacity .15s; }
        .card:hover .del-mark { opacity: 1; }
        .card .del-mark:hover { background: rgba(218,54,51,.9); color: #fff; }
        .card .undo-mark { position: absolute; bottom: 4px; right: 4px; padding: 2px 8px; background: rgba(35,134,54,.9); color: #fff; border-radius: 12px; font-size: 10px; font-weight: 600; cursor: pointer; z-index: 2; font-family: monospace; }
        .card .undo-mark:hover { background: rgba(35,134,54,1); }
        .placeholder-card { background: #161b22; border-radius: 4px; overflow: hidden; }
        .placeholder-card .ph-thumb { width: 100%; aspect-ratio: 1; background: #21262d; animation: phPulse 1.5s ease-in-out infinite; }
        .placeholder-card .ph-line { height: 8px; width: 60%; background: #21262d; border-radius: 4px; margin-top: 4px; }
        @keyframes phPulse { 0%,100% { opacity: .6; } 50% { opacity: .3; } }
        .card.deleted-card img { opacity: .45; filter: grayscale(.5); }

        .loading { text-align: center; padding: 40px; color: #8b949e; }
        .empty { text-align: center; padding: 60px 20px; color: #6e7681; font-size: 14px; }

        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-bg.show { display: flex; }
        .modal-img-wrap { position: relative; display: inline-block; transform-origin: center center; transition: transform .1s; }
        .modal-bg .modal-img-wrap img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 4px; }
        .modal-bg.fs .modal-img-wrap img { max-width: 100vw; max-height: 100vh; border-radius: 0; }
        .modal-bg .modal-img-wrap img.cover { max-width: none; max-height: none; width: 95vw; height: 95vh; object-fit: cover; border-radius: 4px; }
        .modal-bg.fs .modal-img-wrap img.cover { width: 100vw; height: 100vh; border-radius: 0; }
        .modal-bg .modal-img-wrap.cover-wrap { display: block; width: 95vw; height: 95vh; }
        .modal-bg.fs .modal-img-wrap.cover-wrap { display: block; width: 100vw; height: 100vh; }
        .modal-bg.fs { background: #000; }
        .face-overlays { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; overflow: visible; }
        .face-box { position: absolute; border: 2px solid rgba(88,166,255,.8); border-radius: 3px; opacity: 0; transition: opacity .2s; pointer-events: auto; cursor: pointer; background: transparent; }
        .face-overlays:hover .face-box { opacity: 1; }
        .face-box:hover { border-color: #58a6ff; }
        .face-box-label { position: absolute; bottom: calc(100% + 4px); left: 0; background: rgba(88,166,255,.9); color: #fff; font-size: 13px; font-weight: 600; padding: 3px 8px; border-radius: 3px; white-space: nowrap; max-width: none; overflow: visible; text-overflow: unset; line-height: 1.3; }
        .modal-close { position: absolute; top: 14px; right: 16px; color: #fff; font-size: 26px; cursor: pointer; z-index: 1001; line-height: 1; opacity: .7; transition: opacity .5s; height: 26px; display: flex; align-items: center; }
        .modal-close:hover { opacity: 1; }
        .modal-nav { position: absolute; top: 50%; color: #fff; font-size: 44px; cursor: pointer; z-index: 1001; opacity: .5; user-select: none; padding: 20px 12px; transform: translateY(-50%); }
        .modal-nav:hover { opacity: .9; }
        .modal-prev { left: 8px; }
        .modal-next { right: 8px; }
        .modal-fs { position: absolute; top: 14px; right: 52px; color: #fff; font-size: 20px; cursor: pointer; z-index: 1001; opacity: .7; transition: opacity .5s; line-height: 1; height: 26px; display: flex; align-items: center; }
        .modal-fs:hover { opacity: 1; }
        .modal-fit { position: absolute; top: 14px; right: 88px; cursor: pointer; z-index: 1001; opacity: .7; transition: opacity .5s; height: 26px; display: flex; align-items: center; }
        .modal-fit:hover { opacity: 1; }
        .fit-icon { position: relative; transition: width .2s, height .2s; width: 18px; height: 10px; }
        .fit-icon i { position: absolute; width: 5px; height: 5px; border: 1.5px solid #fff; font-style: normal; transition: top .2s, left .2s, right .2s, bottom .2s; }
        .fit-icon i.tl { top: 0; left: 0; border-top: 1.5px solid #fff; border-left: 1.5px solid #fff; }
        .fit-icon i.tr { top: 0; right: 0; border-top: 1.5px solid #fff; border-right: 1.5px solid #fff; }
        .fit-icon i.bl { bottom: 0; left: 0; border-bottom: 1.5px solid #fff; border-left: 1.5px solid #fff; }
        .fit-icon i.br { bottom: 0; right: 0; border-bottom: 1.5px solid #fff; border-right: 1.5px solid #fff; }
        .fit-icon.outer i.tl { top: -2px; left: -2px; }
        .fit-icon.outer i.tr { top: -2px; right: -2px; }
        .fit-icon.outer i.bl { bottom: -2px; left: -2px; }
        .fit-icon.outer i.br { bottom: -2px; right: -2px; }
        .modal-topbar { position: absolute; bottom: 16px; left: 16px; z-index: 1001; background: rgba(0,0,0,.6); padding: 4px 12px; border-radius: 6px; display: flex; align-items: center; gap: 10px; color: #c9d1d9; font-size: 13px; transition: opacity .5s; }
        .modal-cam { color: #8b949e; font-size: 11px; margin-left: 6px; }
        .modal-topbar .sep { color: rgba(255,255,255,.2); margin: 0 2px; }
        .modal-gps { color: #58a6ff; font-size: 11px; font-weight: 600; background: rgba(88,166,255,.15); padding: 1px 6px; border-radius: 3px; cursor: pointer; white-space: nowrap; }
        .modal-gps:hover { background: rgba(88,166,255,.3); }
        .modal-gps-manual { color: #fff; font-size: 10px; font-weight: 600; background: rgba(218,54,51,.8); padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
        .modal-add-gps { color: #fff; font-size: 11px; font-weight: 600; background: rgba(35,134,54,.8); padding: 2px 6px; border-radius: 3px; cursor: pointer; white-space: nowrap; }
        .modal-add-gps:hover { background: rgba(35,134,54,1); }
        .modal-clear-gps { color: #fff; font-size: 11px; font-weight: 600; background: rgba(218,54,51,.7); padding: 2px 6px; border-radius: 3px; cursor: pointer; white-space: nowrap; }
        .modal-clear-gps:hover { background: rgba(218,54,51,.9); }
        .modal-topbar button { background: none; border: none; color: rgba(255,255,255,.35); font-size: 16px; cursor: pointer; padding: 0 3px; transition: color .2s; vertical-align: middle; }
        .modal-topbar button:hover { color: #fff; }
        .modal-topbar .ss-stop { display: none; }
        .modal-topbar .ss-stop:hover { color: #f85149; }
        .modal-topbar.playing .ss-stop { display: inline; }
        .modal-topbar.playing .ss-dir { display: none; }
        .modal-topbar.hidden { opacity: 0; transition: opacity .5s; pointer-events: none; }
        .modal-fs.hidden, .modal-close.hidden, .modal-fit.hidden { opacity: 0; pointer-events: none; }
        .card .expand-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,.6); color: #c9d1d9; border: none; border-radius: 3px; width: 28px; height: 28px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; }
        .card:hover .expand-btn { opacity: .8; }
        .card .expand-btn:hover { opacity: 1; background: rgba(0,0,0,.8); }
        .card .goto-btn { position: absolute; top: 36px; right: 4px; background: rgba(0,0,0,.6); color: #c9d1d9; border: none; border-radius: 3px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; }
        .card:hover .goto-btn { opacity: .8; }
        .card .goto-btn:hover { opacity: 1; background: rgba(0,0,0,.8); }
        .gps-badge { position: absolute; bottom: 4px; right: 4px; background: rgba(88,166,255,.8); color: #fff; font-size: 9px; padding: 1px 5px; border-radius: 2px; font-weight: 700; cursor: pointer; z-index: 2; }
        .gps-badge:hover { background: rgba(88,166,255,1); }

        .detail-panel { display: none; position: fixed; top: 0; right: 0; width: 380px; height: 100%; background: #161b22; border-left: 1px solid #30363d; z-index: 1001; overflow-y: auto; padding: 20px; color: #c9d1d9; font-size: 13px; }
        .detail-panel.show { display: block; }
        .detail-panel h2 { color: #58a6ff; font-size: 14px; margin-bottom: 10px; }
        .detail-panel .dp-close { position: absolute; top: 10px; right: 14px; cursor: pointer; color: #6e7681; font-size: 18px; }
        .detail-panel .dp-close:hover { color: #c9d1d9; }
        .detail-panel .dp-img { width: 100%; border-radius: 4px; margin-bottom: 12px; }
        .detail-panel .dp-desc { color: #c9d1d9; margin-bottom: 12px; line-height: 1.5; }
        .detail-panel .dp-desc.rich { color: #d29922; border-left: 3px solid #d29922; padding-left: 8px; }
        .detail-panel .dp-meta { color: #8b949e; font-size: 11px; margin-bottom: 4px; }
        .rich-preview textarea { width: 100%; height: 60px; background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-radius: 4px; padding: 6px; font-size: 12px; font-family: monospace; resize: vertical; }
        .rich-preview textarea:focus { border-color: #1f6feb; outline: none; }
        .rich-actions { margin-top: 4px; font-size: 11px; font-family: monospace; }
        .rich-actions button { padding: 3px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: monospace; margin-right: 4px; }
        .rich-actions .btn-save { background: #238636; color: #fff; }
        .rich-actions .btn-reject { background: #da3633; color: #fff; }
        .rich-actions .btn-cancel { background: #484f58; color: #fff; }
        .rich-error { color: #f85149; font-size: 11px; }
        .detail-panel .dp-personas { margin-top: 10px; }
        .manual-date-badge { display: inline-block; background: rgba(218,54,51,.8); color: #fff; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; cursor: pointer; }
        .manual-date-badge:hover { background: rgba(218,54,51,1); }
        .dp-date-btn { font-size: 10px; color: #6e7681; cursor: pointer; font-family: monospace; text-decoration: underline; }
        .dp-date-btn:hover { color: #58a6ff; }
        .dp-date-clear { font-size: 11px; color: #f85149; cursor: pointer; font-weight: 600; }
        .dp-date-clear:hover { color: #da3633; }
        .dp-date-input { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; padding: 3px 6px; font-family: monospace; font-size: 11px; }
        .dp-date-input:focus { outline: none; border-color: #58a6ff; }
        .dp-date-save { padding: 3px 8px; background: #238636; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; font-family: monospace; }
        .dp-date-save:hover { background: #2ea043; }
        .dp-date-cancel { padding: 3px 8px; background: #21262d; color: #c9d1d9; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; font-family: monospace; }
        .dp-date-cancel:hover { background: #30363d; }
        .dp-pchip { display: inline-flex; align-items: center; gap: 5px; background: #0d1117; border-radius: 4px; padding: 4px 6px; margin: 3px 2px; cursor: pointer; }
        .dp-pchip:hover { background: #21262d; }
        .dp-pchip img { width: 28px; height: 28px; border-radius: 2px; object-fit: cover; }
        .dp-pchip .nm { font-size: 11px; color: #58a6ff; }
        .dp-pchip.has-name .nm { color: #3fb950; }

        .person-filter { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 1002; justify-content: center; align-items: center; }
        .person-filter.show { display: flex; }
        .pf-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; width: 400px; max-height: 80vh; overflow-y: auto; }
        .pf-box h3 { color: #58a6ff; font-size: 14px; margin-bottom: 12px; }
        .pf-item { display: flex; align-items: center; gap: 8px; padding: 6px 4px; cursor: pointer; border-radius: 4px; }
        .pf-item:hover { background: #21262d; }
        .pf-item img { width: 32px; height: 32px; border-radius: 2px; object-fit: cover; }
        .pf-item .nm { color: #c9d1d9; font-size: 12px; }
        .pf-item .cnt { color: #6e7681; font-size: 10px; margin-left: auto; }
        .pf-close { text-align: center; margin-top: 12px; }
        .pf-close button { background: #21262d; color: #c9d1d9; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; }

        .face-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.9); z-index: 1001; }
        .face-modal.show { display: flex; justify-content: center; align-items: center; }
        .fm-inner { width: 90vw; max-width: 900px; max-height: 90vh; display: grid; grid-template-columns: 1fr 320px; background: #161b22; border-radius: 8px; padding: 16px; color: #c9d1d9; overflow: hidden; }
        .fm-left { display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .fm-left img.face-ctx { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 4px; display: block; }
        .fm-right { padding-left: 16px; overflow-y: auto; border-left: 1px solid #30363d; display: flex; flex-direction: column; }
        .fm-right h2 { color: #58a6ff; font-size: 15px; margin-bottom: 8px; }
        .fm-right label { display: block; color: #8b949e; font-size: 11px; margin-top: 10px; margin-bottom: 3px; }
        .fm-right input, .fm-right textarea { width: 100%; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; padding: 6px 8px; font-family: monospace; font-size: 13px; }
        .fm-right input:focus, .fm-right textarea:focus { outline: none; border-color: #58a6ff; }
        .fm-right textarea { height: 50px; resize: vertical; }
        .fm-right .btn-row { margin-top: 12px; display: flex; gap: 8px; }
        .fm-right button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .fm-right .btn-save { background: #238636; color: #fff; }
        .fm-right .btn-save:hover { background: #2ea043; }
        .fm-right .btn-cancel { background: #21262d; color: #c9d1d9; }
        .fm-right .btn-cancel:hover { background: #30363d; }
        .fm-right .saved { color: #3fb950; font-size: 12px; margin-top: 6px; display: none; }
        .ac-wrap { position: relative; }
        .ac-list { position: absolute; top: 100%; left: 0; right: 0; background: #0d1117; border: 1px solid #30363d; border-top: none; border-radius: 0 0 4px 4px; max-height: 150px; overflow-y: auto; z-index: 10; display: none; }
        .ac-list.show { display: block; }
        .ac-item { padding: 5px 8px; cursor: pointer; font-size: 12px; }
        .ac-item:hover { background: #21262d; }
        .fm-right .cluster-info { color: #8b949e; font-size: 11px; margin-bottom: 8px; }
        .related { margin-top: 10px; border-top: 1px solid #30363d; padding-top: 8px; }
        .related-title { color: #8b949e; font-size: 10px; margin-bottom: 4px; }
        .related-grid { display: flex; flex-wrap: wrap; gap: 4px; }
        .rel-chip { display: inline-flex; align-items: center; gap: 3px; background: #0d1117; border-radius: 3px; padding: 2px 4px; cursor: pointer; font-size: 10px; }
        .rel-chip:hover { background: #21262d; }
        .rel-chip.current { outline: 2px solid #58a6ff; }
        .rel-chip img { width: 24px; height: 24px; border-radius: 2px; object-fit: cover; }
        .rel-chip .lbl { color: #8b949e; }

        .rename-dialog { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 1003; justify-content: center; align-items: center; }
        .rename-dialog.show { display: flex; }
        .rd-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; max-width: 400px; color: #c9d1d9; font-size: 13px; }
        .rd-box p { margin-bottom: 12px; }
        .rd-box .rd-btns { display: flex; gap: 8px; }
        .rd-box button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .rd-all { background: #238636; color: #fff; }
        .rd-one { background: #58a6ff; color: #fff; }

<script>
var API = '/api';
var pageSize = 60;
var totalResults = 0;
var activeYear = '';
var activePerson = '';
var allPersonas = [];
var dateData = null;
var MONTH_NAMES = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
var currentPhotos = [];
var _isLoading = false;
var _canLoadMore = true;
var _canLoadPrev = false;
var _firstDate = null;
var _lastDate = null;
var _firstPath = null;
var _lastPath = null;
var _noDateMode = false;
var _needleMode = false;
var _prefetchQueue = [];
var _prefetching = false;
var _PREFETCH_AHEAD = 5;
var _phCount = 0;
var _faceLazyObs = null;

function _observeThumbs() {
    if (!_faceLazyObs) {
        _faceLazyObs = new IntersectionObserver(function(entries) {
            for (var i = 0; i < entries.length; i++) {
                if (entries[i].isIntersecting) {
                    var img = entries[i].target;
                    var ds = img.getAttribute('data-src');
                    if (ds) { img.setAttribute('src', ds); img.removeAttribute('data-src'); }
                    _faceLazyObs.unobserve(img);
                }
            }
        }, { rootMargin: '0px' });
    }
    var faces = document.querySelectorAll('.lazy-face[data-src]');
    for (var i = 0; i < faces.length; i++) _faceLazyObs.observe(faces[i]);
}
var fmAcNames = [];
var fmCurrentPid = null;
var fmOriginalName = '';
var fmOriginalComment = '';
var fmRelatedClusters = [];
var _isLightTheme = false;

function toggleTheme() {
    _isLightTheme = !_isLightTheme;
    document.body.classList.toggle('light-theme', _isLightTheme);
    localStorage.setItem('gallery-theme', _isLightTheme ? 'light' : 'dark');
    updateThemeIcon();
}

function updateThemeIcon() {
    var btn = document.querySelector('.theme-toggle');
    if (btn) {
        btn.innerHTML = _isLightTheme ? '\u263E' : '\u2600';
        btn.title = _isLightTheme ? 'Тёмная тема' : 'Дневная тема';
    }
    var logo = document.querySelector('h1 .logo');
    if (logo) {
        logo.src = _isLightTheme ? logo.dataset.light : logo.dataset.dark;
    }
}

function esc(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

var isSemanticMode = false;

function onModeChange() {
    var mode = document.getElementById('searchMode').value;
    var input = document.getElementById('searchInput');
    var sr = document.getElementById('sortRelevance');
    if (mode === 'semantic') {
        input.placeholder = 'Смысловой поиск: опишите что ищете...';
        sr.style.display = '';
        document.getElementById('sortSelect').value = 'relevance';
    } else {
        input.placeholder = 'Поиск по описанию...';
        sr.style.display = 'none';
        if (document.getElementById('sortSelect').value === 'relevance') {
            document.getElementById('sortSelect').value = 'date_desc';
        }
    }
}

function doSearch() {
    currentPhotos = [];
    _needleMode = false;
    _canLoadMore = true;
    _canLoadPrev = true;
    _isLoading = false;
    _prefetchQueue = [];
    _prefetching = false;
    _phCount = 0;
    _firstDate = null;
    _lastDate = null;
    _firstPath = null;
    _lastPath = null;
    isSemanticMode = false;
    document.getElementById('grid').innerHTML = '';
    var q = document.getElementById('searchInput').value.trim();
    var mode = document.getElementById('searchMode').value;
    if (_restoreNeedleDate) {
        document.getElementById('searchInput').value = '';
        document.getElementById('searchMode').value = 'text';
        onModeChange();
        isSemanticMode = false;
    }
    q = document.getElementById('searchInput').value.trim();
    mode = document.getElementById('searchMode').value;
    if (mode === 'semantic' && q) {
        doSemanticSearch(q);
        return;
    }
    var afterDate = activeYear ? activeYear : null;
    if (activeYear === 'no_date') {
        _noDateMode = true;
        activeYear = '';
        afterDate = null;
    } else {
        _noDateMode = false;
    }
    saveFilters();
    if (_restoreNeedleDate && !afterDate) {
        var saved = _restoreNeedleDate;
        _restoreNeedleDate = null;
        _needleMode = true;
        var sortSel = document.getElementById('sortSelect');
        if (sortSel && sortSel.value === 'date_desc') sortSel.value = 'date_asc';
        loadAfter(saved, null, true);
    } else {
        _restoreNeedleDate = null;
        loadAfter(afterDate);
    }
}

function getSearchParams() {
    var q = document.getElementById('searchInput').value.trim();
    var sort = document.getElementById('sortSelect').value;
    var facesOnly = document.getElementById('chkFaces').checked;
    var hasDesc = document.getElementById('chkHasDesc').checked;
    var issuesOnly = document.getElementById('chkIssues').checked;
    var gpsOnly = document.getElementById('chkGps').checked;
    var deletedOnly = document.getElementById('chkDeleted').checked;
    var photoType = document.getElementById('photoTypeSelect').value;
    var params = 'limit=' + pageSize + '&sort=' + sort;
    if (q) params += '&q=' + encodeURIComponent(q);
    if (activePerson) params += '&person=' + encodeURIComponent(activePerson);
    if (facesOnly) params += '&has_faces=true';
    if (hasDesc) params += '&has_description=true';
    if (issuesOnly) params += '&has_issues=true';
    if (gpsOnly) params += '&has_gps=true';
    if (photoType) params += '&photo_type=' + encodeURIComponent(photoType);
    if (_noDateMode) params += '&no_date=true';
    if (deletedOnly) params += '&deleted_only=true';
    return params;
}

function loadAfter(afterDate, afterPath, useDateFrom) {
    if (_isLoading || !_canLoadMore) return;
    _isLoading = true;
    var params = getSearchParams();
    if (afterDate) {
        if (useDateFrom) {
            params += '&date_from=' + encodeURIComponent(afterDate);
        } else {
            params += '&date_after=' + encodeURIComponent(afterDate);
            if (afterPath) params += '&path_after=' + encodeURIComponent(afterPath);
        }
    }
    if (currentPhotos.length === 0) document.getElementById('grid').innerHTML = '<div class="loading">Загрузка...</div>';

    var taken = _prefetchQueue.shift();
    if (taken && taken.key === params + '|' + (afterDate||'') + '|' + (afterPath||'') + '|' + (useDateFrom||'')) {
        _applyBatch(taken.data);
        _isLoading = false;
        _fillPrefetch();
    } else {
        _prefetchQueue = [];
        appendPlaceholders(pageSize);
        fetch(API + '/photos/search?' + params).then(function(r) { return r.json(); }).then(function(data) {
            removePlaceholders();
            _applyBatch(data);
            _isLoading = false;
            _fillPrefetch();
        }).catch(function(e) {
            removePlaceholders();
            if (currentPhotos.length === 0) document.getElementById('grid').innerHTML = '<div class="empty">Ошибка: ' + esc(e.message) + '</div>';
            _isLoading = false;
        });
    }
}

function _applyBatch(data) {
    totalResults = data.total;
    if (currentPhotos.length === 0) document.getElementById('grid').innerHTML = '';
    if (data.photos.length === 0 && currentPhotos.length === 0) {
        document.getElementById('grid').innerHTML = '<div class="empty">Ничего не найдено</div>';
    }
    var startIdx = currentPhotos.length;
    currentPhotos = currentPhotos.concat(data.photos);
    if (data.photos.length > 0) {
        _lastDate = data.photos[data.photos.length - 1].date || null;
        _lastPath = data.photos[data.photos.length - 1].path || null;
        if (!_firstDate) {
            _firstDate = data.photos[0].date || null;
            _firstPath = data.photos[0].path || null;
        }
    }
    if (data.photos.length < pageSize) _canLoadMore = false;
    appendGrid(data.photos, startIdx);
    updateInfo();
    saveFilters();
    if (startIdx === 0) {
        setTimeout(function() { updateTimelinePosition(); }, 100);
        if (_needleMode && _restorePhotoId) {
            var rid = _restorePhotoId;
            _restorePhotoId = null;
            _needleMode = false;
            var scrollAttempts = 0;
            function scrollToPhoto() {
                var el = document.querySelector('.card[data-photo-id="' + CSS.escape(rid) + '"]');
                if (el) el.scrollIntoView({ block: 'start' });
                scrollAttempts++;
                if (scrollAttempts < 5) setTimeout(scrollToPhoto, 400);
            }
            setTimeout(scrollToPhoto, 300);
        }
    }
    if (data.photos.length < totalResults) {
        _canLoadPrev = true;
    }
}

function appendPlaceholders(count) {
    var grid = document.getElementById('grid');
    var html = '';
    for (var i = 0; i < count; i++) {
        html += '<div class="card placeholder-card"><div class="ph-thumb"></div><div class="overlay"><div class="ph-line"></div></div></div>';
    }
    grid.insertAdjacentHTML('beforeend', html);
    _phCount += count;
}

function removePlaceholders() {
    var phs = document.querySelectorAll('.placeholder-card');
    for (var i = phs.length - 1; i >= 0; i--) phs[i].remove();
    _phCount = 0;
}

function _fillPrefetch() {
    if (!_canLoadMore || _prefetching) return;
    var needed = _PREFETCH_AHEAD - _prefetchQueue.length;
    if (needed <= 0) return;
    _prefetching = true;
    var params0 = getSearchParams();
    var chainDate = _lastDate;
    var chainPath = _lastPath;
    if (_prefetchQueue.length > 0) {
        var last = _prefetchQueue[_prefetchQueue.length - 1];
        if (last.data.photos.length > 0) {
            chainDate = last.data.photos[last.data.photos.length - 1].date || null;
            chainPath = last.data.photos[last.data.photos.length - 1].path || null;
        }
    }
    var requests = [];
    var curD = chainDate, curP = chainPath;
    for (var i = 0; i < needed; i++) {
        requests.push({ date: curD, path: curP });
        curD = null; curP = null;
    }
    function doNext(idx) {
        if (idx >= requests.length) { _prefetching = false; return; }
        var req = requests[idx];
        var par = params0;
        if (req.date) {
            par += '&date_after=' + encodeURIComponent(req.date);
            if (req.path) par += '&path_after=' + encodeURIComponent(req.path);
        }
        var key = par + '|' + (req.date || '') + '|' + (req.path || '');
        fetch(API + '/photos/search?' + par).then(function(r) { return r.json(); }).then(function(data) {
            _prefetchQueue.push({ key: key, data: data });
            if (data.photos.length > 0) {
                for (var j = idx + 1; j < requests.length; j++) {
                    if (!requests[j].date) {
                        requests[j].date = data.photos[data.photos.length - 1].date || null;
                        requests[j].path = data.photos[data.photos.length - 1].path || null;
                    } else break;
                }
            }
            doNext(idx + 1);
        }).catch(function() { doNext(idx + 1); });
    }
    doNext(0);
}

function loadBefore(beforeDate, beforePath) {
    if (_isLoading || !_canLoadPrev || !beforeDate) return;
    _isLoading = true;
    var sortVal = document.getElementById('sortSelect').value;
    var sortForBefore = sortVal === 'date_asc' ? 'date_desc' : (sortVal === 'date_desc' ? 'date_asc' : sortVal);
    var params = getSearchParams().replace('sort=' + sortVal, 'sort=' + sortForBefore);
    params += '&date_before=' + encodeURIComponent(beforeDate);
    if (beforePath) params += '&path_before=' + encodeURIComponent(beforePath);

    var oldScrollH = document.documentElement.scrollHeight;
    fetch(API + '/photos/search?' + params).then(function(r) { return r.json(); }).then(function(data) {
        console.log('loadBefore got:', data.photos.length, 'photos');
        if (data.photos.length > 0) {
            data.photos.reverse();
            _firstDate = data.photos[0].date || null;
            _firstPath = data.photos[0].path || null;
            var startIdx = 0;
            currentPhotos = data.photos.concat(currentPhotos);
            prependGrid(data.photos, startIdx);
        }
        if (data.photos.length < pageSize) _canLoadPrev = false;
        var newScrollH = document.documentElement.scrollHeight;
        window.scrollBy(0, newScrollH - oldScrollH);
        _isLoading = false;
        updateInfo();
    }).catch(function(e) { console.log('loadBefore error:', e); _isLoading = false; });
}

function updateInfo() {
    var leftText = 'Найдено: <b>' + totalResults + '</b>';
    var q = document.getElementById('searchInput').value.trim();
    if (q) leftText += ' по запросу «' + esc(q) + '»';
    if (activePerson) leftText += ' персона: ' + esc(activePerson);
    document.getElementById('infoLeft').innerHTML = leftText;
    document.getElementById('infoRight').textContent = currentPhotos.length + ' / ' + totalResults;
}

function doSemanticSearch(q) {
    currentPhotos = [];
    _canLoadMore = false;
    _isLoading = true;
    isSemanticMode = true;
    document.getElementById('grid').innerHTML = '<div class="loading">Поиск по смыслу... (освобождаем GPU, это может занять до 30с)</div>';
    var url = API + '/photos/semantic_search?q=' + encodeURIComponent(q) + '&limit=100';
    var controller = new AbortController();
    var timeoutId = setTimeout(function() { controller.abort(); }, 90000);
    fetch(url, {signal: controller.signal}).then(function(r) { return r.json(); }).then(function(data) {
        clearTimeout(timeoutId);
        totalResults = data.total;
        currentPhotos = data.photos;
        _canLoadMore = false;
        _isLoading = false;
        document.getElementById('grid').innerHTML = '';
        if (data.photos.length === 0) {
            document.getElementById('grid').innerHTML = '<div class="empty">Ничего не найдено' + (data.error ? ' (' + esc(data.error) + ')' : '') + '</div>';
        }
        appendGrid(data.photos, 0);
        var leftText = 'Смысловой поиск: <b>' + data.total + '</b> по запросу &laquo;' + esc(q) + '&raquo;';
        document.getElementById('infoLeft').innerHTML = leftText;
        document.getElementById('infoRight').textContent = data.total + ' фото';
    }).catch(function(e) {
        clearTimeout(timeoutId);
        document.getElementById('grid').innerHTML = '<div class="empty">Ошибка: ' + esc(e.message || e) + '</div>';
        _isLoading = false;
    });
}

function _monthKey(dateStr) {
    if (!dateStr || dateStr.length < 7) return null;
    return dateStr.substring(0, 7);
}

function _monthDividerHtml(dateStr) {
    var key = _monthKey(dateStr);
    if (!key) return '';
    var y = key.substring(0, 4);
    var m = parseInt(key.substring(5, 7), 10);
    return '<div class="month-divider" data-month="' + key + '"><span class="md-year">' + esc(y) + '</span><span class="md-month">' + MONTH_NAMES[m - 1] + '</span></div>';
}

function appendGrid(photos, startIdx) {
    var grid = document.getElementById('grid');
    var html = '';
    var lastMonth = null;
    var lastCard = grid.querySelector('.card:last-child');
    if (lastCard) lastMonth = lastCard.getAttribute('data-date') ? _monthKey(lastCard.getAttribute('data-date')) : null;
    for (var i = 0; i < photos.length; i++) {
        if (!isSemanticMode) {
            var mk = _monthKey(photos[i].date || '');
            if (mk && mk !== lastMonth) {
                html += _monthDividerHtml(photos[i].date);
                lastMonth = mk;
            }
        }
        html += buildCardHtml(photos[i], startIdx + i);
    }
    grid.insertAdjacentHTML('beforeend', html);
    _canLoadPrev = true;
    reindexAll();
    _observeThumbs();
}

function prependGrid(photos, startIdx) {
    var grid = document.getElementById('grid');
    var html = '';
    var lastMonth = null;
    for (var i = 0; i < photos.length; i++) {
        var mk = _monthKey(photos[i].date || '');
        if (mk && mk !== lastMonth) {
            html += _monthDividerHtml(photos[i].date);
            lastMonth = mk;
        }
        html += buildCardHtml(photos[i], startIdx + i);
    }
    grid.insertAdjacentHTML('afterbegin', html);
    reindexAll();
    _observeThumbs();
}

function reindexAll() {
    var cards = document.querySelectorAll('.card');
    for (var i = 0; i < cards.length; i++) {
        cards[i].setAttribute('onclick', 'openDetail(' + i + ')');

     var html = '<div class="card' + (p.deleted ? ' deleted-card' : '') + '" data-date="' + esc(p.date || '') + '" data-photo-id="' + esc(p.photo_id || '') + '" onclick="openDetail(' + idx + ')" ondblclick="event.stopPropagation();openViewer(' + idx + ');toggleFullscreen()">';

    }

function loadTimeline() {
    fetch(API + '/photos/dates').then(function(r) { return r.json(); }).then(function(data) {
        dateData = data;

        var years = data.years || {};
        var keys = Object.keys(years).sort();
        for (var i = 0; i < keys.length; i++) {

            html += '<div class="tl-bar" data-year="' + y + '">' + label + '</div>';
        }
        html += '<div class="tl-needle" id="tlNeedle"><div class="tl-needle-arrow"></div><div class="tl-needle-flag" id="tlNeedleFlag"></div></div>';
        var tl = document.getElementById('timeline');
        tl.innerHTML = html;
        tl.onclick = onTimelineClick;
    }).catch(function() {});

function onTimelineClick(e) {
    var tl = document.getElementById('timeline');
    var bars = tl.querySelectorAll('.tl-bar[data-year]');
    if (!bars.length) return;
    var tlRect = tl.getBoundingClientRect();
    var clickX = e.clientX - tlRect.left + tl.scrollLeft;
    var needle = document.getElementById('tlNeedle');

    var clickedBar = null;
    var bestDist = Infinity;
    for (var i = 0; i < bars.length; i++) {
        var br = bars[i];
        var cx = br.offsetLeft + br.offsetWidth / 2;
        var dist = Math.abs(clickX - cx);
        if (dist < bestDist) { bestDist = dist; clickedBar = br; }
    }

    if (clickedBar && (clickedBar.getAttribute('data-year') === 'no_date')) {
        selectYear('no_date');
        return;
    }

    var yearBars = [];
    for (var i = 0; i < bars.length; i++) {
        var yStr = bars[i].getAttribute('data-year');
        if (yStr === '' || yStr === 'no_date') continue;
        var bYear = parseInt(yStr);
        if (isNaN(bYear)) continue;
        yearBars.push({ el: bars[i], year: bYear, cx: bars[i].offsetLeft + bars[i].offsetWidth / 2 });
    }
    if (!yearBars.length) return;

    var clickFrac = 0;
    if (clickX <= yearBars[0].cx) {
        clickFrac = yearBars[0].year;
    } else if (clickX >= yearBars[yearBars.length - 1].cx) {
        clickFrac = yearBars[yearBars.length - 1].year + 0.5;
    } else {
        for (var j = 0; j < yearBars.length - 1; j++) {
            var a = yearBars[j], b = yearBars[j + 1];
            if (clickX >= a.cx && clickX <= b.cx) {
                var frac = (clickX - a.cx) / (b.cx - a.cx);
                clickFrac = a.year + frac * (b.year - a.year);
                break;
            }
        }
    }

    var clickDate = fracToISO(clickFrac);

    if (needle) {
        needle.style.transition = 'none';
        needle.style.left = clickX + 'px';
        updateNeedleFlag(clickDate);
    }

    activeYear = '';
    _needleMode = true;
    _noDateMode = false;
    currentPhotos = [];
    _canLoadMore = true;
    _canLoadPrev = false;
    _isLoading = false;
    _firstDate = null;
    _lastDate = null;
    _firstPath = null;
    _lastPath = null;
    document.getElementById('grid').innerHTML = '';
    var sortSel = document.getElementById('sortSelect');
    if (sortSel && sortSel.value === 'date_desc') {
        sortSel.value = 'date_asc';
    }
    _lastDate = clickDate;
    saveFilters();
    loadAfter(clickDate);
}

function fracToISO(frac) {
    var y = Math.floor(frac);
    var rest = frac - y;
    var totalDays = Math.round(rest * 365);
    var d = new Date(y, 0, 1 + totalDays);
    var mm = ('0' + (d.getMonth() + 1)).slice(-2);
    var dd = ('0' + d.getDate()).slice(-2);
    return y + '-' + mm + '-' + dd;
}

function updateNeedleFlag(dateStr) {
    var flag = document.getElementById('tlNeedleFlag');
    var needle = document.getElementById('tlNeedle');
    if (!flag) return;
    if (!dateStr) { flag.textContent = ''; return; }
    if (dateStr === 'Без даты') {
        flag.textContent = '';
        if (needle) needle.style.opacity = '0';
        var ndBar = document.querySelector('.tl-bar[data-year="no_date"]');
        if (ndBar) { ndBar.style.background = '#da3633'; ndBar.style.color = '#fff'; }
        return;
    }
    var ndBar = document.querySelector('.tl-bar[data-year="no_date"]');
    if (ndBar) { ndBar.style.background = ''; ndBar.style.color = ''; }
    if (needle) needle.style.opacity = '1';
    var p = dateStr.substring(0, 10).split('-');
    if (p.length === 3) flag.textContent = p[2] + '.' + p[1] + '.' + p[0];
    else flag.textContent = dateStr.substring(0, 10);
}

function selectYear(year) {
    activeYear = year || '';
    if (year === 'no_date') {
        updateNeedleFlag('Без даты');
    } else {
        updateNeedleFlag(year + '-01-01');
    }
    var needle = document.getElementById('tlNeedle');
    var tl = document.getElementById('timeline');
    if (needle && tl) {
        var bars = tl.querySelectorAll('.tl-bar[data-year]');
        for (var i = 0; i < bars.length; i++) {
            if (bars[i].getAttribute('data-year') === year) {
                needle.style.transition = 'left .4s ease-out';
                needle.style.left = (bars[i].offsetLeft + bars[i].offsetWidth / 2) + 'px';
                break;
            }
        }
    }
    doSearch();
}

function slideshowToggle(dir) {
    _ssDir = dir;
    clearInterval(_ssTimer);
    document.getElementById('modalTopbar').classList.add('playing');
    _ssTimer = setInterval(function() {
        var newIdx = _mIdx + _ssDir;
        if (newIdx < 0) {
            slideshowStop();
            return;
        }
        if (newIdx >= currentPhotos.length) {
            if (_canLoadMore && !_isLoading) {
                loadAfter(_lastDate, _lastPath);
            } else {
                slideshowStop();
                return;
            }
        }
        if (newIdx < currentPhotos.length) {
            openViewer(newIdx);
            _cacheImg(newIdx + _ssDir);
            _cacheImg(newIdx + _ssDir * 2);
        }
    }, 5000);
}

function _drawFaceBoxes(p, img) {
    var ov = document.getElementById('faceOverlays');
    ov.innerHTML = '';
    var faces = p.faces || [];
    if (!faces.length) return;
    function doDraw() {
        var dispW = img.clientWidth;
        var dispH = img.clientHeight;
        if (!dispW || !dispH) return;
        var natW = img.naturalWidth || p.img_width || 1;
        var natH = img.naturalHeight || p.img_height || 1;
        var scaleX = dispW / natW;
        var scaleY = dispH / natH;
        var html = '';
        for (var i = 0; i < faces.length; i++) {
            var f = faces[i];
            if (f.bbox_x1 == null) continue;
            var x1 = f.bbox_x1 * scaleX;
            var y1 = f.bbox_y1 * scaleY;
            var x2 = f.bbox_x2 * scaleX;
            var y2 = f.bbox_y2 * scaleY;
            var name = f.display_name || f.name || '';
            html += '<div class="face-box" style="left:' + x1 + 'px;top:' + y1 + 'px;width:' + (x2 - x1) + 'px;height:' + (y2 - y1) + 'px"';
            if (f.persona_id) html += ' onclick="event.stopPropagation();openFaceModal(\'' + esc(f.persona_id) + '\',\'' + esc(f.face_id) + '\')"';
            html += '>';
            if (name) html += '<div class="face-box-label">' + esc(name) + '</div>';
            html += '</div>';
        }
        ov.innerHTML = html;
    }
    if (img.complete && img.naturalWidth) {
        doDraw();
    } else {
        img.onload = doDraw;
    }
}

function _clearFaceBoxes() {
    document.getElementById('faceOverlays').innerHTML = '';
}

        body: JSON.stringify({ photo_id: photoId, manual_date: manualDate })
    }).then(function(r) { return r.json(); }).then(function(data) {

function formatDate(ds) {
    if (!ds) return '';
    var p = ds.substring(0, 19).replace('T', ' ');
    return p.replace(/^(\d{4})[:\-](\d{2})[:\-](\d{2})/, function(m, y, mo, d) { return d + '.' + mo + '.' + y; });
}

function smartFit() {
    var img = document.getElementById('photoModalImg');
    var wrap = document.getElementById('modalImgWrap');
    var icon = document.getElementById('fitIcon');
    var p = currentPhotos[_mIdx];
    if (!img || !p) return;

    if (img.classList.contains('cover')) {
        img.classList.remove('cover');
        wrap.classList.remove('cover-wrap');
        img.style.objectPosition = '';
        wrap.style.transform = '';
        wrap.style.transformOrigin = 'center center';
        _mZoom = 1; _mPx = 0; _mPy = 0;
        _updateFitIcon(p, false);
        return;
    }

    img.classList.add('cover');
    wrap.classList.add('cover-wrap');

    var natW = img.naturalWidth || p.img_width || 1;
    var natH = img.naturalHeight || p.img_height || 1;
    var faceCenterX = natW / 2;
    var faceCenterY = natH / 2;

    var faces = p.faces || [];
    if (faces.length > 0) {
        var fx1 = Infinity, fy1 = Infinity, fx2 = 0, fy2 = 0;
        for (var i = 0; i < faces.length; i++) {
            var f = faces[i];
            if (f.bbox_x1 == null) continue;
            fx1 = Math.min(fx1, f.bbox_x1);
            fy1 = Math.min(fy1, f.bbox_y1);
            fx2 = Math.max(fx2, f.bbox_x2);
            fy2 = Math.max(fy2, f.bbox_y2);
        }
        if (fx1 < Infinity) {
            faceCenterX = (fx1 + fx2) / 2;
            faceCenterY = (fy1 + fy2) / 2;
        }
    }

    var pctX = (faceCenterX / natW * 100).toFixed(1);
    var pctY = (faceCenterY / natH * 100).toFixed(1);
    img.style.objectPosition = pctX + '% ' + pctY + '%';
    wrap.style.transform = '';
    _mZoom = 1; _mPx = 0; _mPy = 0;
    _updateFitIcon(p, true);
}

function _updateFitIcon(p, isCover) {
    var icon = document.getElementById('fitIcon');
    var btn = document.querySelector('.modal-fit');
    if (!icon) return;
    var maxW = 18, maxH = 14;
    var w, h;
    if (isCover) {
        var isFs = document.getElementById('photoModal').classList.contains('fs');
        var ratio = isFs ? (window.innerWidth / window.innerHeight) : (window.innerWidth * 0.95 / (window.innerHeight * 0.95));
        w = maxW;
        h = Math.max(4, Math.round(maxW / ratio));
        icon.classList.add('outer');
        if (btn) btn.title = 'Сжать';
    } else {
        var pw = p.img_width || 4;
        var ph = p.img_height || 3;
        var ratio = pw / ph;
        if (ratio >= 1) {
            w = maxW;
            h = Math.max(4, Math.round(maxW / ratio));
        } else {
            h = maxH;
            w = Math.max(4, Math.round(h * ratio));
        }
        icon.classList.remove('outer');
        if (btn) btn.title = 'Растянуть';
    }
    icon.style.width = w + 'px';
    icon.style.height = h + 'px';
}

document.getElementById('photoModal').addEventListener('wheel', function(e) {
    e.preventDefault();
    var rect = document.getElementById('modalImgWrap').getBoundingClientRect();
    var cx = e.clientX - rect.left - rect.width / 2 - _mPx;
    var cy = e.clientY - rect.top - rect.height / 2 - _mPy;
    var oldZ = _mZoom;
    var delta = e.deltaY > 0 ? 0.8 : 1.25;
    _mZoom = Math.max(1, Math.min(20, _mZoom * delta));
    var ratio = _mZoom / oldZ;
    _mPx -= cx * (ratio - 1);
    _mPy -= cy * (ratio - 1);
    if (_mZoom <= 1) { _mPx = 0; _mPy = 0; }
    applyModalTransform();
});

document.getElementById('modalImgWrap').addEventListener('mousedown', function(e) {
    if (_mZoom > 1) {
        e.preventDefault();
        _mDrag = true;
        _mDX = e.clientX - _mPx;
        _mDY = e.clientY - _mPy;
        e.currentTarget.style.cursor = 'grabbing';
    }
});

document.addEventListener('mousemove', function(e) {
    if (_mDrag) {
        _mPx = e.clientX - _mDX;
        _mPy = e.clientY - _mDY;
        applyModalTransform();
    }
});

document.addEventListener('mouseup', function() {
    if (_mDrag) {
        _mDrag = false;
        document.getElementById('modalImgWrap').style.cursor = 'grab';

});

function renderPersonList(list) {
    var groups = {};
    var unnamed = [];
    for (var i = 0; i < list.length; i++) {
        var p = list[i];
        if (p.display_name) {
            var key = p.display_name;
            if (!groups[key]) groups[key] = { display_name: key, face_count: 0, face_id: null, persona_ids: [] };
            groups[key].face_count += (p.face_count || 0);
            if (!groups[key].face_id && p.face_id) groups[key].face_id = p.face_id;
            groups[key].persona_ids.push(p.persona_id);
        } else {
            unnamed.push(p);
        }
    }
    var named = [];
    for (var k in groups) named.push(groups[k]);
    named.sort(function(a, b) { return b.face_count - a.face_count; });
    unnamed.sort(function(a, b) { return (b.face_count || 0) - (a.face_count || 0); });

    var html = '';
    if (activePerson) {
        html += '<div class="pf-item" onclick="clearPersonFilter()"><span class="nm" style="color:#d29922">Сбросить фильтр</span></div>';
    }
    for (var i = 0; i < named.length; i++) {
        var p = named[i];
        html += '<div class="pf-item" onclick="selectPersonFilter(\'' + esc(p.display_name) + '\')">';
        if (p.face_id) html += '<img src="' + API + '/photos/face/' + p.face_id + '?margin=0.5" loading="lazy">';
        html += '<span class="nm">' + esc(p.display_name) + '</span>';
        html += '<span class="cnt">' + p.face_count + 'л</span></div>';
    }
    if (unnamed.length > 0) {
        html += '<div style="color:#6e7681;font-size:10px;padding:6px 4px;margin-top:8px">Без имени:</div>';
        for (var i = 0; i < Math.min(unnamed.length, 20); i++) {
            var p = unnamed[i];
            html += '<div class="pf-item" onclick="selectPersonFilter(\'' + esc(p.name || p.persona_id) + '\')">';
        if (p.face_id) html += '<img src="' + API + '/photos/face/' + p.face_id + '?margin=0.5" loading="lazy">';
            html += '<span class="nm" style="color:#6e7681">' + esc(p.name || p.persona_id) + '</span>';
            html += '<span class="cnt">' + (p.face_count || 0) + 'л</span></div>';
        }
    }
    document.getElementById('pfList').innerHTML = html;
}

function filterPersonList() {
    var val = document.getElementById('pfSearch').value.toLowerCase();

function updateTimelinePosition() {
    if (!dateData || !dateData.years) return;
    var needle = document.getElementById('tlNeedle');
    var tl = document.getElementById('timeline');
    if (!needle || !tl) return;

    if (_noDateMode) {
        _needleDateISO = null;
        var ndBar = tl.querySelector('.tl-bar[data-year="no_date"]');
        if (ndBar) {
            needle.style.transition = 'left .4s ease-out';
            needle.style.left = (ndBar.offsetLeft + ndBar.offsetWidth / 2) + 'px';
        }
        updateNeedleFlag('Без даты');
        return;
    }

    var cards = document.querySelectorAll('.card[data-date]');
    if (cards.length === 0) return;

    var winH = window.innerHeight;
    var firstVisible = null;
    for (var i = 0; i < cards.length; i++) {
        var rect = cards[i].getBoundingClientRect();
        if (rect.bottom > 0 && rect.top < winH) {
            firstVisible = cards[i];
            break;
        }
    }
    if (!firstVisible) return;

    var nearDate = firstVisible.getAttribute('data-date');
    if (!nearDate) return;
    _needleDateISO = nearDate;
    _firstVisiblePhotoId = firstVisible.getAttribute('data-photo-id') || null;

    var nearYear = parseInt(nearDate.substring(0, 4));
    if (isNaN(nearYear)) { _needleDateISO = null; return; }
    var nearMonth = parseInt(nearDate.substring(5, 7)) || 1;
    var nearDay = parseInt(nearDate.substring(8, 10)) || 1;
    var nearHour = parseInt(nearDate.substring(11, 13)) || 0;
    var nearMin = parseInt(nearDate.substring(14, 16)) || 0;
    var yearFrac = nearYear + (nearMonth - 1) / 12 + (nearDay - 1) / 365 + (nearHour * 60 + nearMin) / 1440 / 365;

    updateNeedleFlag(nearDate);

    var bars = tl.querySelectorAll('.tl-bar[data-year]');
    var prevBar = null, nextBar = null;
    for (var j = 0; j < bars.length; j++) {
        var yStr = bars[j].getAttribute('data-year');
        if (!yStr || yStr === 'no_date' || yStr === '') continue;
        var bYear = parseInt(yStr);
        if (isNaN(bYear)) continue;
        if (bYear <= nearYear) prevBar = bars[j];
        if (bYear > nearYear && !nextBar) nextBar = bars[j];
    }

    var newLeft;
    if (prevBar && nextBar) {
        var pLeft = prevBar.offsetLeft + prevBar.offsetWidth / 2;
        var nLeft = nextBar.offsetLeft + nextBar.offsetWidth / 2;
        var pYear = parseInt(prevBar.getAttribute('data-year'));
        var nYear = parseInt(nextBar.getAttribute('data-year'));
        var frac = (yearFrac - pYear) / (nYear - pYear);
        if (frac < 0) frac = 0;
        if (frac > 1) frac = 1;
        newLeft = pLeft + (nLeft - pLeft) * frac;
    } else if (prevBar) {
        newLeft = prevBar.offsetLeft + prevBar.offsetWidth / 2;
    } else if (nextBar) {
        newLeft = nextBar.offsetLeft + nextBar.offsetWidth / 2;
    } else {
        return;
    }

    needle.style.transition = 'left .4s ease-out';
    needle.style.left = newLeft + 'px';

    if (nearYear !== _scrollYear) {
        _scrollYear = nearYear;
        for (var m = 0; m < bars.length; m++) {
            var bY = parseInt(bars[m].getAttribute('data-year'));
            if (bY === nearYear) {
                bars[m].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                break;
            }
        }
    }
}

window.addEventListener('scroll', function() {
    var scrollY = window.scrollY || window.pageYOffset;
    var winH = window.innerHeight;
    var docH = document.documentElement.scrollHeight;
    var header = document.getElementById('headerSticky');

    if (scrollY > _lastScrollY && scrollY > 200) {
        header.style.transform = 'translateY(-100%)';
        document.getElementById('timeline').style.top = '0';
    } else {
        header.style.transform = 'translateY(0)';
        document.getElementById('timeline').style.top = header.offsetHeight + 'px';
    }
    _lastScrollY = scrollY;

    if (!_isLoading) {
        if (_canLoadMore && scrollY + winH >= docH - 2000) loadAfter(_lastDate, _lastPath);
        if (_canLoadPrev && scrollY < 800) {
            loadBefore(_firstDate, _firstPath);
        }
    }

    updateTimelinePosition();
});
</script>
</body>
</html>
