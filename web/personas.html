<script>
var API = '/api';
var allPersonas = [];
var acNames = [];
var _pmClusterIds = [];
var _allGroups = {};
var editingPid = null;
var pendingName = null;
var relatedClusters = [];

function esc(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function loadAcNames() {
    fetch(API + '/persons/names').then(function(r) { return r.json(); }).then(function(n) { acNames = n; });
}

function loadPersonas() {
    fetch(API + '/persons/?limit=500').then(function(r) { return r.json(); }).then(function(data) {
        allPersonas = data.persons;
        _personasAllLoaded = false;
        var total = data.total;

        var named = allPersonas.filter(function(p) { return p.display_name; });
        document.getElementById('totalCount').textContent = total;
        document.getElementById('namedCount').textContent = named.length;

        applyFilter();
        loadAcNames();
    }).catch(function() {
        document.getElementById('personas').innerHTML = '<div class="loading" style="color:#f85149">Ошибка загрузки</div>';
    });
}

var _personasAllLoaded = false;

function _ensureAllPersonas(cb) {
    if (_personasAllLoaded) { cb(); return; }
    fetch(API + '/persons/?limit=50000').then(function(r) { return r.json(); }).then(function(data) {
        allPersonas = data.persons;
        _personasAllLoaded = true;
        cb();
    });
}

function applyFilter() {
    var q = document.getElementById('filterInput').value.toLowerCase();
    var mode = document.getElementById('filterMode').value;

    if (mode === 'unnamed' && !_personasAllLoaded) {
        _ensureAllPersonas(function() { applyFilter(); });
        return;
    }

    var filtered = allPersonas;
    if (mode === 'named') filtered = filtered.filter(function(p) { return p.display_name; });
    if (mode === 'unnamed') filtered = filtered.filter(function(p) { return !p.display_name; });
    if (q) {
        filtered = filtered.filter(function(p) {
            var hay = ((p.display_name || '') + ' ' + (p.name || '') + ' ' + (p.persona_id || '')).toLowerCase();
            return hay.indexOf(q) >= 0;
        });
    }

    var groups = {};
    var unnamed = [];
    _allGroups = {};
    for (var i = 0; i < filtered.length; i++) {
        var p = filtered[i];
        if (p.display_name) {
            var key = p.display_name;
            if (!groups[key]) groups[key] = { display_name: key, face_count: 0, face_id: null, persona_ids: [], cluster_ids: [], comment: null };
            groups[key].face_count += (p.face_count || 0);
            if (!groups[key].face_id && p.face_id) groups[key].face_id = p.face_id;
            if (!groups[key].comment && p.comment) groups[key].comment = p.comment;
            groups[key].persona_ids.push(p.persona_id);
            groups[key].cluster_ids.push(p.persona_id);
        } else {
            unnamed.push(p);
        }
    }
    var named = [];
    for (var k in groups) { named.push(groups[k]); _allGroups[k] = groups[k]; }
    named.sort(function(a, b) { return b.face_count - a.face_count; });
    unnamed.sort(function(a, b) { return (b.face_count || 0) - (a.face_count || 0); });

    var namedPanel = document.getElementById('namedPanel');
    var unnamedArea = document.getElementById('unnamedArea');
    namedPanel.innerHTML = '<h3>С именем (' + named.length + ')</h3>';
    unnamedArea.innerHTML = '<h3>Без имени (' + unnamed.length + ')</h3>';

    if (named.length === 0 && unnamed.length === 0) {
        namedPanel.innerHTML += '<div class="empty">Ничего не найдено</div>';
        return;
    }

    var namedGrid = document.createElement('div');
    namedGrid.className = 'named-grid';
    for (var i = 0; i < named.length; i++) {
        namedGrid.appendChild(createNamedCard(named[i]));
    }
    namedPanel.appendChild(namedGrid);

    var unnamedGrid = document.createElement('div');
    unnamedGrid.className = 'unnamed-grid';
    for (var i = 0; i < unnamed.length; i++) {
        unnamedGrid.appendChild(createUnnamedCard(unnamed[i]));
    }
    unnamedArea.appendChild(unnamedGrid);
}

function createNamedCard(group) {
    var card = document.createElement('div');
    card.className = 'named-card';

    var top = document.createElement('div');
    top.className = 'nc-top';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'pname';
    nameSpan.textContent = group.display_name;
    if (group.cluster_ids.length > 1) {
        nameSpan.textContent += ' (' + group.cluster_ids.length + ' кл.)';
    }
    top.appendChild(nameSpan);

    var bottom = document.createElement('div');
    bottom.className = 'nc-bottom';

    var thumb = document.createElement('img');
    thumb.className = 'face-thumb';
    if (group.face_id) {
        thumb.src = API + '/photos/face/' + group.face_id + '?margin=0.5';
    } else {
        thumb.style.display = 'none';
    }
    thumb.loading = 'lazy';

    var countDiv = document.createElement('div');
    countDiv.className = 'nc-count';
    countDiv.innerHTML = group.face_count + '<small>л.</small>';

    bottom.appendChild(thumb);
    bottom.appendChild(countDiv);

    top.onclick = function() { openPersonaModal(group.display_name, group.face_id, group.face_count, group.cluster_ids, true, null, group.comment); };
    bottom.onclick = top.onclick;

    card.appendChild(top);
    card.appendChild(bottom);
    return card;
}

function createUnnamedCard(persona) {
    var card = document.createElement('div');
    card.className = 'unnamed-card';
    card.setAttribute('data-pid', persona.persona_id);

    var thumb = document.createElement('img');
    thumb.className = 'face-thumb';
    if (persona.face_id) {
        thumb.src = API + '/photos/face/' + persona.face_id + '?margin=0.5';
    } else {
        thumb.style.display = 'none';
    }
    thumb.loading = 'lazy';

    var info = document.createElement('div');
    info.className = 'uc-info';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'uc-name';
    nameSpan.textContent = persona.name || persona.persona_id;
    var countSpan = document.createElement('span');
    countSpan.className = 'uc-count';
    countSpan.textContent = (persona.face_count || 0) + ' л.';
    info.appendChild(nameSpan);
    info.appendChild(countSpan);

    card.appendChild(thumb);
    card.appendChild(info);

    card.onclick = function() { toggleUnnamedExpand(card, persona); };

    return card;
}

function toggleNamedExpand(card, group) {
    openPersonaModal(group.display_name, group.face_id, group.face_count, group.cluster_ids, true);
}

function toggleUnnamedExpand(card, persona) {
    openPersonaModal(persona.name || persona.persona_id, persona.face_id, persona.face_count || 0, [persona.persona_id], false, persona.persona_id, persona.comment);
}

function openPersonaModal(name, faceId, faceCount, clusterIds, isGroup, singlePid, comment) {
    _pmClusterIds = clusterIds;
    var modal = document.getElementById('personaModal');
    var overlay = document.getElementById('pmOverlay');
    var thumb = document.getElementById('pmThumb');
    var pmName = document.getElementById('pmName');
    var pmMeta = document.getElementById('pmMeta');
    var pmBody = document.getElementById('pmBody');

    if (faceId) {
        thumb.src = API + '/photos/face/' + faceId + '?margin=0.5';
        thumb.style.display = '';
    } else {
        thumb.style.display = 'none';
    }
    pmName.textContent = name;
    pmMeta.textContent = faceCount + ' лиц' + (isGroup && clusterIds.length > 1 ? ' \xB7 ' + clusterIds.length + ' кластеров' : '') + ' \xB7 ' + clusterIds.join(', ');

    var bodyHtml = '';
    var pid = isGroup ? name : singlePid;

    bodyHtml += '<div class="pm-edit">';
    bodyHtml += '<label>ФИО / Имя</label>';
    bodyHtml += '<div class="ac-wrap">';
    bodyHtml += '<input type="text" id="pmNameInput" value="' + esc(isGroup ? name : '') + '" oninput="pmAcSearch()" onfocus="pmAcSearch()" onblur="pmAcHideDelayed()">';
    bodyHtml += '<div class="ac-list" id="pmAcList"></div>';
    bodyHtml += '</div>';
    bodyHtml += '<label style="margin-top:8px">Комментарий</label>';
    bodyHtml += '<textarea id="pmCommentInput" rows="2" class="pm-comment-input" placeholder="Мама, бабушка, друг семьи...">' + esc(comment || '') + '</textarea>';
    bodyHtml += '<div class="btn-row">';
    bodyHtml += '<button class="btn-save" onclick="pmSaveName(\'' + esc(pid) + '\')">Сохранить</button>';
    bodyHtml += '</div></div>';

    bodyHtml += '<div class="pm-faces-title">Лица (' + faceCount + ')</div>';
    if (isGroup && clusterIds.length > 1) {
        for (var ci = 0; ci < clusterIds.length; ci++) {
            bodyHtml += '<div class="pm-cluster-title">Кластер ' + (ci + 1) + ' (' + clusterIds[ci] + ') <button class="btn-clear" style="font-size:10px;padding:1px 6px;margin-left:8px" onclick="pmDetachCluster(\'' + clusterIds[ci] + '\')">Отвязать</button></div>';
            bodyHtml += '<div class="faces-grid" id="pmFaces_' + ci + '"></div>';
        }
    } else if (isGroup && clusterIds.length === 1) {
        bodyHtml += '<div style="margin-bottom:8px"><button class="btn-clear" onclick="pmDetachCluster(\'' + clusterIds[0] + '\')">Отвязать от имени</button></div>';
        bodyHtml += '<div class="faces-grid" id="pmFaces_0"></div>';
    } else {
        bodyHtml += '<div class="faces-grid" id="pmFaces_0"></div>';
    }

    pmBody.innerHTML = bodyHtml;
    modal.classList.add('show');
    overlay.classList.add('show');

    if (isGroup && clusterIds.length > 1) {
        for (var ci = 0; ci < clusterIds.length; ci++) {
            var facesGrid = document.getElementById('pmFaces_' + ci);
            if (facesGrid) loadPersonaFaces(clusterIds[ci], facesGrid);
        }
    } else {
        var facesGrid = document.getElementById('pmFaces_0');
        if (facesGrid) loadPersonaFaces(clusterIds[0], facesGrid);
    }
}

function closePersonaModal() {
    document.getElementById('personaModal').classList.remove('show');
    document.getElementById('pmOverlay').classList.remove('show');
}

function pmAcSearch() {
    var inp = document.getElementById('pmNameInput');
    var list = document.getElementById('pmAcList');
    if (!inp || !list) return;
    var val = inp.value.toLowerCase();
    if (!val) {
        var allHtml = '';
        for (var ai = 0; ai < Math.min(acNames.length, 15); ai++) {
            var am = acNames[ai];
            var ag = _allGroups[am] || null;
            allHtml += '<div class="ac-item" onmousedown="pmAcSelect(\'' + esc(am) + '\')">';
            if (ag && ag.face_id) allHtml += '<img class="ac-face" src="' + API + '/photos/face/' + ag.face_id + '?margin=0.15">';
            allHtml += '<span class="ac-name">' + esc(am) + '</span>';
            if (ag) allHtml += '<span class="ac-cnt">' + ag.face_count + ' л.</span>';
            allHtml += '</div>';
        }
        list.innerHTML = allHtml;
        list.classList.add('show');
        return;
    }
    var matches = acNames.filter(function(n) { return n.toLowerCase().indexOf(val) >= 0; });
    if (matches.length === 0) { list.classList.remove('show'); return; }
    var html = '';
    for (var i = 0; i < Math.min(matches.length, 10); i++) {
        var m = matches[i];
        var group = null;
        for (var g in _allGroups) {
            if (g === m) { group = _allGroups[g]; break; }
        }
        html += '<div class="ac-item" onmousedown="pmAcSelect(\'' + esc(m) + '\')">';
        if (group && group.face_id) {
            html += '<img class="ac-face" src="' + API + '/photos/face/' + group.face_id + '?margin=0.15">';
        }
        html += '<span class="ac-name">' + esc(m) + '</span>';
        if (group) html += '<span class="ac-cnt">' + group.face_count + ' л.</span>';
        html += '</div>';
    }
    list.innerHTML = html;
    list.classList.add('show');
}

function pmAcSelect(name) {
    var inp = document.getElementById('pmNameInput');
    var commentInput = document.getElementById('pmCommentInput');
    if (inp) inp.value = name;
    if (commentInput) {
        var g = _allGroups[name];
        commentInput.value = (g && g.comment) ? g.comment : '';
    }
}

function pmAcHideDelayed() {
    setTimeout(function() {
        var list = document.getElementById('pmAcList');
        if (list) list.classList.remove('show');
    }, 200);
}

function pmSaveName(pid) {
    var inp = document.getElementById('pmNameInput');
    if (!inp) return;
    var newName = inp.value.trim();
    if (!newName) return;
    var commentInput = document.getElementById('pmCommentInput');
    var newComment = commentInput ? commentInput.value.trim() : '';

    var clustersToSave = _pmClusterIds;
    var saved = 0;
    for (var i = 0; i < clustersToSave.length; i++) {
        fetch(API + '/persons/' + clustersToSave[i], {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ display_name: newName, comment: newComment || null }),
        }).then(function(r) { return r.json(); }).then(function() {
            saved++;
            if (saved === clustersToSave.length) {
                loadPersonas();
                closePersonaModal();
            }
        });
    }
}

function pmClearName(pid) {
    clearName(pid);
}

function pmDetachCluster(clusterId) {
    fetch(API + '/persons/' + clusterId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ display_name: null, comment: null, clear_display_name: true, clear_comment: true }),
    }).then(function(r) { return r.json(); }).then(function() {
        loadPersonas();
        closePersonaModal();
    });
}

function loadPersonaFaces(personaId, grid) {
    fetch(API + '/persons/' + personaId + '/faces?limit=30').then(function(r) { return r.json(); }).then(function(faces) {
        grid.innerHTML = '';
        if (faces.length === 0) {
            grid.innerHTML = '<div style="color:#6e7681;font-size:11px;padding:4px">0 лиц</div>';
            return;
        }
        for (var i = 0; i < faces.length; i++) {
            var face = faces[i];
            var preview = document.createElement('div');
            preview.className = 'face-preview';

            var img = document.createElement('img');
            img.src = API + '/photos/face/' + face.face_id + '?margin=0.5';
            img.alt = 'Face';
            img.loading = 'lazy';

            var conf = document.createElement('span');
            conf.className = 'conf';
            conf.textContent = Math.round(face.confidence * 100);

            preview.appendChild(img);
            preview.appendChild(conf);
            preview.onclick = (function(photoId) {
                return function() { window.open(API + '/photos/?path=' + encodeURIComponent(photoId), '_blank'); };
            })(face.photo_id);

            grid.appendChild(preview);
        }
    }).catch(function() {
        grid.innerHTML = '<div style="color:#f85149;font-size:11px;padding:8px">Ошибка</div>';
    });
}

function toggleEdit(pid) {
    var row = document.getElementById('edit-' + pid);
    if (!row) return;
    row.classList.toggle('show');
    if (row.classList.contains('show')) {
        var inp = document.getElementById('nameInput-' + pid);
        if (inp) inp.focus();
    }
}

function acSearch(pid) {
    var inp = document.getElementById('nameInput-' + pid);
    var list = document.getElementById('acList-' + pid);
    if (!inp || !list) return;
    var val = inp.value.toLowerCase();
    if (!val) { list.classList.remove('show'); return; }
    var matches = acNames.filter(function(n) { return n.toLowerCase().indexOf(val) >= 0; });
    if (matches.length === 0) { list.classList.remove('show'); return; }
    var html = '';
    for (var i = 0; i < matches.length; i++) {
        html += '<div class="ac-item" onmousedown="acSelect(\'' + esc(pid) + '\',\'' + esc(matches[i]) + '\')">' + esc(matches[i]) + '</div>';
    }
    list.innerHTML = html;
    list.classList.add('show');
}

function acHideDelayed(pid) {
    setTimeout(function() {
        var list = document.getElementById('acList-' + pid);
        if (list) list.classList.remove('show');
    }, 200);
}

function acSelect(pid, name) {
    var inp = document.getElementById('nameInput-' + pid);
    var list = document.getElementById('acList-' + pid);
    if (inp) inp.value = name;
    if (list) list.classList.remove('show');
}

function saveName(pid) {
    var inp = document.getElementById('nameInput-' + pid);
    if (!inp) return;
    var newName = inp.value.trim();

    var oldPersona = allPersonas.find(function(p) { return p.persona_id === pid; });
    var oldName = oldPersona ? (oldPersona.display_name || '') : '';

    if (oldName && oldName !== newName && acNames.indexOf(oldName) >= 0) {
        editingPid = pid;
        pendingName = newName;
        fetch(API + '/persons/by_name/' + encodeURIComponent(oldName)).then(function(r) { return r.json(); }).then(function(list) {
            relatedClusters = list;
            if (list.length > 1) {
                document.getElementById('rdText').textContent = 'Имя "' + oldName + '" привязано к ' + list.length + ' кластерам. Применить "' + newName + '":';
                document.getElementById('renameDialog').classList.add('show');
                return;
            }
            doSaveOne();
        });
        return;
    }

    doSaveOne(pid, newName);
}

function doSaveOne(overridePid, overrideName) {
    document.getElementById('renameDialog').classList.remove('show');
    var pid = overridePid || editingPid;
    var name = overrideName || pendingName || '';
    if (!pid) return;
    if (!name) { clearName(pid); return; }

    fetch(API + '/persons/' + pid, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ display_name: name }),
    }).then(function(r) { return r.json(); }).then(function() {
        showSaved(pid);
        loadPersonas();
    });
    editingPid = null;
    pendingName = null;
}

function doSaveAll() {
    document.getElementById('renameDialog').classList.remove('show');
    if (!editingPid || !pendingName) return;
    var oldPersona = allPersonas.find(function(p) { return p.persona_id === editingPid; });
    var oldName = oldPersona ? (oldPersona.display_name || '') : '';
    fetch(API + '/persons/batch/by_name?old_name=' + encodeURIComponent(oldName), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ display_name: pendingName }),
    }).then(function(r) { return r.json(); }).then(function() {
        showSaved(editingPid);
        loadPersonas();
    });
    editingPid = null;
    pendingName = null;
}

function doSaveAbort() {
    document.getElementById('renameDialog').classList.remove('show');
    editingPid = null;
    pendingName = null;
}

function clearName(pid) {
    fetch(API + '/persons/' + pid, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ display_name: null, comment: null, clear_display_name: true, clear_comment: true }),
    }).then(function(r) { return r.json(); }).then(function() {
        showSaved(pid);
        loadPersonas();
    });
}

function showSaved(pid) {
    var el = document.getElementById('saved-' + pid);
    if (el) {
        el.style.display = 'inline';
        setTimeout(function() { el.style.display = 'none'; }, 2000);
    }
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        document.getElementById('renameDialog').classList.remove('show');
    }
});

loadPersonas();
</script>
<script src="/shared.js"></script>
</body>
