<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gailery - Каталог</title>
    <style>

        .light-theme h1 .theme-toggle { color: #0969da; }

        .light-theme .sidebar-wrap { }

        .light-theme .sidebar { background: #f6f8fa; border-color: #d0d7de; }
        .light-theme .sidebar-header { background: #eaeef2; border-color: #d0d7de; color: #24292f; }
        .light-theme .t-item { color: #24292f; }
        .light-theme .t-item:hover { background: #eaeef2; }
        .light-theme .t-item.active { background: #d0d7de; color: #0969da; }
        .light-theme .t-item .t-name { color: #24292f; }
        .light-theme .t-item.active .t-name { color: #0969da; }
        .light-theme .t-item .t-count { color: #57606a; }
        .light-theme .main-panel { background: #ffffff; }
        .light-theme .breadcrumb { background: #f6f8fa; border-color: #d0d7de; }
        .light-theme .bc-item { color: #57606a; }
        .light-theme .bc-item:hover { background: #eaeef2; color: #24292f; }
        .light-theme .bc-item.current { color: #0969da; }
        .light-theme .bc-sep { color: #d0d7de; }
        .light-theme .info-line { background: #f6f8fa; border-color: #d0d7de; color: #57606a; }
        .light-theme .folder-card { background: #ffffff; border-color: #d0d7de; }

        .light-theme .photo-card { background: #f6f8fa; border-color: #d0d7de; }
        .light-theme .photo-card:hover { border-color: #0969da; }
        .light-theme .photo-card .p-name { color: #24292f; }
        .light-theme .photo-card .p-size { color: #57606a; }
        .light-theme .photo-card .p-badges { background: rgba(255,255,255,.85); }
        .light-theme .badge-ok { color: #1f883d; }
        .light-theme .badge-no { color: #8c949e; }
        .light-theme .modal-bg { background: rgba(0,0,0,.85); }
        .light-theme .modal-close { color: #c9d1d9; }
        .light-theme .modal-nav { color: #c9d1d9; }
        .light-theme .modal-fs { color: #c9d1d9; }
        .light-theme .modal-date { background: rgba(255,255,255,.8); color: #24292f; }
        .light-theme .empty-msg { color: #57606a; }
        .light-theme .add-source-btn { background: #eaeef2; color: #24292f; border-color: #d0d7de; }
        .light-theme .add-source-btn:hover { background: #d0d7de; }
        .light-theme .add-dialog { background: #ffffff; border-color: #d0d7de; color: #24292f; }
        .light-theme .add-dialog input { background: #f6f8fa; color: #24292f; border-color: #d0d7de; }
        .light-theme .add-dialog input:focus { border-color: #0969da; }
        .light-theme .add-dialog .ad-up { background: #eaeef2; color: #24292f; border-color: #d0d7de; }
        .light-theme .add-dialog .ad-up:hover { background: #d0d7de; }
        .light-theme .add-dialog .ad-cwd { color: #57606a; }
        .light-theme .add-dialog .ad-dir-list { background: #f6f8fa; border-color: #d0d7de; }
        .light-theme .add-dialog .ad-dir-item { color: #24292f; }
        .light-theme .add-dialog .ad-dir-item:hover { background: #eaeef2; }
        .light-theme .add-dialog .ad-dir-item.selected { background: #0969da; color: #fff; }
        .light-theme .root-menu-item:hover { background: #eaeef2; }
        .light-theme .root-menu-item.active { background: #d0d7de; color: #0969da; }
        .light-theme .root-menu-item.disabled .rm-alias { color: #8c949e; }
        .light-theme .root-menu-item.disabled .rm-path { color: #d0d7de; }

        h1 { padding: 14px 20px; background: #161b22; border-bottom: 1px solid #30363d; font-size: 16px; color: #58a6ff; display: flex; align-items: center; justify-content: space-between; position: relative; flex-shrink: 0; }
        h1 .nav { font-size: 13px; padding-right: 50px; }
        h1 .nav a { color: #6e7681; text-decoration: none; margin-left: 14px; }
        h1 { display: flex; align-items: center; }
        h1 .logo { height: 32px; width: auto; margin-right: 6px; }
        
        h1 .nav a:hover { color: #58a6ff; }
        h1 .nav a.active { color: #58a6ff; }

        .fm { display: flex; flex: 1; min-height: 0; }
        .sidebar-wrap { width: 260px; min-width: 160px; max-width: 500px; overflow: hidden; resize: horizontal; position: relative; }
        .sidebar-wrap::-webkit-resizer { background: #30363d; border-left: 3px solid #58a6ff; }
        .sidebar { width: 100%; height: 100%; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 8px 12px; background: #0d1117; border-bottom: 1px solid #21262d; font-size: 11px; color: #8b949e; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .sidebar-header .add-btn { background: none; border: 1px solid #30363d; color: #58a6ff; font-size: 14px; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .sidebar-header .add-btn:hover { background: #21262d; }
        .sidebar-tree { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 4px 0; }

        .t-item { display: flex; align-items: center; gap: 6px; padding: 4px 8px; cursor: pointer; font-size: 12px; white-space: nowrap; border-radius: 3px; margin: 0 4px; }
        .t-item:hover { background: #21262d; }
        .t-item.active { background: #30363d; }
        .t-item .t-arrow { color: #484f58; font-size: 10px; width: 14px; text-align: center; flex-shrink: 0; transition: transform .15s; }
        .t-item .t-arrow.open { transform: rotate(90deg); }
        .t-item .t-icon { font-size: 14px; flex-shrink: 0; }
        .t-item .t-name { overflow: hidden; text-overflow: ellipsis; flex: 1; color: #c9d1d9; }
        .t-item.active .t-name { color: #58a6ff; }
        .t-item .t-count { color: #484f58; font-size: 10px; flex-shrink: 0; }
        .t-children { margin-left: 16px; display: none; }
        .t-children.open { display: block; }
        .t-root-item .t-icon { color: #e3b341; }
        .t-loading { color: #484f58; font-size: 10px; padding: 2px 0 2px 40px; }

        .root-menu-item { padding: 6px 10px; cursor: pointer; border-radius: 4px; font-size: 11px; display: flex; align-items: flex-start; gap: 8px; }
        .root-menu-item:hover { background: #21262d; }
        .root-menu-item.active { background: #30363d; }
        .root-menu-item .rm-check { margin-top: 2px; width: 16px; height: 16px; cursor: pointer; accent-color: #58a6ff; flex-shrink: 0; }
        .root-menu-item .rm-info { flex: 1; min-width: 0; }
        .root-menu-item .rm-alias { color: #58a6ff; font-size: 12px; font-weight: bold; }
        .root-menu-item .rm-path { color: #6e7681; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .root-menu-item.disabled .rm-alias { color: #484f58; }
        .root-menu-item.disabled .rm-path { color: #30363d; }

        .main-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; background: #0d1117; }

        .detail-panel-wrap { width: 14px; min-width: 14px; overflow: hidden; border-left: 1px solid #30363d; position: relative; transition: width .2s ease; }
        .detail-panel-wrap.open { width: 320px; min-width: 240px; max-width: 600px; resize: horizontal; }
        .dp-tab { width: 14px; height: 60px; position: absolute; top: 50%; left: 0; transform: translateY(-50%); cursor: pointer; display: flex; align-items: center; justify-content: center; background: #161b22; border-right: 1px solid #30363d; border-radius: 0 4px 4px 0; }
        .dp-tab:hover { background: #21262d; }
        .dp-tab .dp-tab-arrow { color: #484f58; font-size: 10px; transition: transform .2s; }
        .detail-panel-wrap.open .dp-tab { display: none; }
        .detail-panel { width: 320px; min-width: 240px; max-width: 600px; height: 100%; background: #161b22; display: flex; flex-direction: column; overflow: hidden; }
        .detail-panel-header { padding: 8px 12px; background: #0d1117; border-bottom: 1px solid #21262d; font-size: 11px; color: #8b949e; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .detail-panel-header .dp-close { background: none; border: none; color: #484f58; font-size: 14px; cursor: pointer; padding: 2px 6px; border-radius: 3px; }
        .detail-panel-header .dp-close:hover { color: #c9d1d9; background: #21262d; }
        .detail-panel-body { flex: 1; overflow-y: auto; padding: 12px; font-size: 12px; color: #c9d1d9; }
        .detail-panel-body .dp-label { color: #8b949e; font-size: 10px; margin-bottom: 2px; margin-top: 10px; }
        .detail-panel-body .dp-label:first-child { margin-top: 0; }
        .detail-panel-body .dp-value { color: #c9d1d9; font-size: 12px; word-break: break-all; }
        .detail-panel-body .dp-value.empty { color: #484f58; font-style: italic; }

        .light-theme .detail-panel { background: #f6f8fa; }
        .light-theme .dp-tab { background: #f6f8fa; border-color: #d0d7de; }
        .light-theme .dp-tab:hover { background: #eaeef2; }
        .light-theme .detail-panel-header { background: #eaeef2; border-color: #d0d7de; color: #57606a; }
        .light-theme .detail-panel-header .dp-close { color: #57606a; }
        .light-theme .detail-panel-header .dp-close:hover { color: #24292f; background: #d0d7de; }
        .light-theme .detail-panel-body { color: #24292f; }
        .light-theme .detail-panel-body .dp-label { color: #57606a; }
        .light-theme .detail-panel-body .dp-value { color: #24292f; }
        .light-theme .detail-panel-body .dp-value.empty { color: #8c949e; }
        .light-theme .detail-panel-wrap { border-left-color: #d0d7de; }

        .breadcrumb { padding: 8px 16px; background: #161b22; border-bottom: 1px solid #21262d; display: flex; gap: 2px; align-items: center; font-size: 12px; flex-wrap: wrap; flex-shrink: 0; }
        .bc-item { color: #6e7681; cursor: pointer; padding: 2px 6px; border-radius: 3px; }
        .bc-item:hover { background: #21262d; color: #c9d1d9; }
        .bc-item.current { color: #58a6ff; cursor: default; }
        .bc-sep { color: #30363d; font-size: 10px; }

        .info-line { padding: 6px 16px; background: #0d1117; border-bottom: 1px solid #21262d; font-size: 11px; color: #484f58; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .info-line b { color: #8b949e; }

        .content-wrap { flex: 1; min-height: 0; overflow-y: auto; padding: 12px 16px; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, 180px); gap: 10px; }

        .folder-card { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: border-color .15s; }
        .folder-card:hover { border-color: #58a6ff; }
        .folder-card .f-icon { font-size: 28px; color: #e3b341; flex-shrink: 0; }
        .folder-card .f-info { min-width: 0; flex: 1; }
        .folder-card .f-name { font-size: 12px; color: #c9d1d9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .folder-card .f-count { font-size: 10px; color: #6e7681; margin-top: 2px; }
        .folder-card .f-bar { height: 3px; background: #21262d; border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .folder-card .f-bar-fill { height: 100%; background: #238636; border-radius: 2px; }

        .photo-card { background: #161b22; border: 1px solid #21262d; border-radius: 6px; overflow: hidden; cursor: pointer; position: relative; transition: border-color .15s; }
        .photo-card:hover { border-color: #58a6ff; }
        .photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #21262d; }
        .photo-card .p-name { padding: 4px 6px; font-size: 10px; color: #c9d1d9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .photo-card .p-size { padding: 0 6px 2px; font-size: 9px; color: #6e7681; }
        .photo-card .p-badges { position: absolute; top: 4px; right: 4px; display: flex; gap: 2px; background: rgba(0,0,0,.65); border-radius: 3px; padding: 1px 4px; }
        .badge-ok { color: #3fb950; font-size: 9px; }
        .badge-no { color: #484f58; font-size: 9px; }

        .empty-msg { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #484f58; font-size: 13px; }

        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-bg.show { display: flex; }
        .modal-img-wrap { position: relative; display: inline-block; transform-origin: center center; transition: transform .1s; }
        .modal-bg .modal-img-wrap img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 4px; }
        .modal-bg.fs .modal-img-wrap img { max-width: 100vw; max-height: 100vh; border-radius: 0; }
        .modal-bg.fs { background: #000; }
        .modal-close { position: absolute; top: 12px; right: 16px; color: #fff; font-size: 30px; cursor: pointer; z-index: 1001; line-height: 1; opacity: .7; }
        .modal-close:hover { opacity: 1; }
        .modal-fs { position: absolute; top: 12px; right: 56px; color: #fff; font-size: 22px; cursor: pointer; z-index: 1001; opacity: .5; }
        .modal-fs:hover { opacity: .9; }
        .modal-nav { position: absolute; top: 50%; color: #fff; font-size: 44px; cursor: pointer; z-index: 1001; opacity: .5; user-select: none; padding: 20px 12px; transform: translateY(-50%); }
        .modal-nav:hover { opacity: .9; }
        .modal-prev { left: 8px; }
        .modal-next { right: 8px; }
        .face-overlays { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; overflow: visible; }
        .face-box { position: absolute; border: 2px solid rgba(88,166,255,.8); border-radius: 3px; opacity: 0; transition: opacity .2s; pointer-events: auto; cursor: pointer; background: transparent; }
        .face-overlays:hover .face-box { opacity: 1; }
        .face-box:hover { border-color: #58a6ff; }
        .face-box-label { position: absolute; bottom: calc(100% + 4px); left: 0; background: rgba(88,166,255,.9); color: #fff; font-size: 13px; font-weight: 600; padding: 3px 8px; border-radius: 3px; white-space: nowrap; max-width: none; overflow: visible; text-overflow: unset; line-height: 1.3; }

        .add-dialog { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 1002; justify-content: center; align-items: center; }
        .add-dialog.show { display: flex; }
        .add-dialog .ad-box { background: #1c2128; border: 2px solid #58a6ff; border-radius: 8px; padding: 20px; width: 480px; max-width: 90vw; color: #c9d1d9; font-size: 13px; }
        .add-dialog .ad-box h3 { color: #58a6ff; font-size: 14px; margin-bottom: 12px; }
        .add-dialog .ad-box label { display: block; color: #8b949e; font-size: 11px; margin-bottom: 3px; margin-top: 8px; }
        .add-dialog .ad-box input { width: 100%; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; padding: 6px 8px; font-family: monospace; font-size: 12px; }
        .add-dialog .ad-box input:focus { outline: none; border-color: #58a6ff; }
        .add-dialog .ad-browse { margin-bottom: 10px; }
        .add-dialog .ad-path-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
        .add-dialog .ad-up { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; cursor: pointer; font-size: 14px; padding: 4px 8px; }
        .add-dialog .ad-up:hover { background: #30363d; }
        .add-dialog .ad-cwd { color: #8b949e; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        .add-dialog .ad-dir-list { max-height: 240px; overflow-y: auto; border: 1px solid #30363d; border-radius: 4px; background: #0d1117; }
        .add-dialog .ad-dir-item { padding: 6px 10px; cursor: pointer; font-size: 12px; color: #c9d1d9; display: flex; align-items: center; gap: 6px; }
        .add-dialog .ad-dir-item:hover { background: #21262d; }
        .add-dialog .ad-dir-item.selected { background: #1f6feb; color: #fff; }
        .add-dialog .ad-dir-item .di-icon { color: #e3b341; }
        .add-dialog .ad-btns { margin-top: 14px; display: flex; gap: 8px; }
        .add-dialog .ad-btns button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .ad-ok { background: #238636; color: #fff; }
        .ad-ok:hover { background: #2ea043; }
        .ad-cancel { background: #21262d; color: #c9d1d9; }
        .ad-cancel:hover { background: #30363d; }

        .loading { text-align: center; padding: 40px; color: #484f58; font-size: 12px; }
        .hamburger { display: none; background: none; border: none; color: #c9d1d9; font-size: 20px; cursor: pointer; padding: 8px 10px; min-width: 44px; min-height: 44px; align-items: center; justify-content: center; order: 99; }
.mm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; }
.mm-overlay.open { display: block; }
.mm-panel { position: fixed; top: 0; right: 0; width: 280px; height: 100%; background: #161b22; border-left: 1px solid #30363d; z-index: 1000; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .3s ease; will-change: transform; }
.mm-panel.open { transform: translateX(0); }
.mm-panel.dragging { transition: none; }
.mm-head { padding: 14px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #21262d; }
.mm-head img { height: 24px; }
.mm-head span { font-size: 14px; font-weight: 600; color: #c9d1d9; }
.mm-x { margin-left: auto; background: none; border: none; color: #6e7681; font-size: 20px; cursor: pointer; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
.mm-x:hover { color: #c9d1d9; }
.mm-nav { flex: 1; overflow-y: auto; padding: 4px 0; }
.mm-a { display: flex; align-items: center; gap: 12px; padding: 13px 16px; color: #8b949e; text-decoration: none; font-size: 14px; border-left: 3px solid transparent; transition: background .15s, color .15s; }
.mm-a:hover { background: #21262d; color: #c9d1d9; }
.mm-a.active { color: #58a6ff; background: rgba(88,166,255,.06); border-left-color: #58a6ff; }
.mm-a.active .mm-lbl { font-weight: 600; }
.mm-ico { width: 24px; text-align: center; font-size: 18px; flex-shrink: 0; }
.mm-lbl { flex: 1; }
.mm-foot { padding: 10px 16px; border-top: 1px solid #21262d; }
.mm-theme { display: flex; align-items: center; gap: 10px; background: none; border: none; color: #8b949e; font-size: 13px; cursor: pointer; padding: 10px 0; width: 100%; font-family: monospace; }
.mm-theme:hover { color: #c9d1d9; }
.mm-theme-ico { font-size: 18px; }
.mm-edge { display: none; position: fixed; top: 0; right: 0; width: 24px; height: 100%; z-index: 998; }
.light-theme .mm-panel { background: #f6f8fa; border-left-color: #d0d7de; }
.light-theme .mm-head { border-bottom-color: #d0d7de; }
.light-theme .mm-head span { color: #24292f; }
.light-theme .mm-x { color: #57606a; }
.light-theme .mm-a { color: #57606a; }
.light-theme .mm-a:hover { background: #eaeef2; color: #24292f; }
.light-theme .mm-a.active { color: #0969da; background: rgba(9,105,218,.06); border-left-color: #0969da; }
.light-theme .mm-foot { border-top-color: #d0d7de; }
.light-theme .mm-theme { color: #57606a; }
.sidebar-toggle { display: none; position: fixed; bottom: 20px; left: 20px; z-index: 90; background: #238636; color: #fff; border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 22px; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,.4); cursor: pointer; }
.sidebar-close-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 99; }
.sidebar-close-overlay.mob-open { display: block; }
@media (max-width: 768px) {
    .hamburger { display: flex; }
    h1 .nav { display: none; }
    h1 .theme-toggle { display: none; }
    h1 { padding-right: 12px; flex-shrink: 0; }
    h1 span { font-size: 14px; }
    .sidebar-wrap { display: none; position: fixed; top: 0; left: 0; width: 80%; height: 100%; z-index: 100; resize: none; }
    .sidebar-wrap.mob-open { display: block; }
    .sidebar-toggle { display: flex; }
    .content-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
    .folder-card { padding: 8px; }

<script>
var API = '/api';
var currentRootId = '';
var currentPath = '';
var currentRootAlias = '';
var rootsData = [];
var catalogFiles = [];
var _mIdx = -1;
var _mZoom = 1;
var _mPx = 0;
var _mPy = 0;
var _mDrag = false;
var _mDX = 0;
var _mDY = 0;

function esc(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function fmtSize(bytes) {
    if (bytes < 1024) return bytes + ' Б';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' КБ';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' МБ';
    return (bytes / 1073741824).toFixed(1) + ' ГБ';
}

var _browsePath = '/';
var _selectedPath = '';

function showAddDialog() {
    var existing = document.getElementById('addDialog');
    if (existing) existing.remove();

    var overlay = document.createElement('div');
    overlay.id = 'addDialog';
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:1002;display:flex;justify-content:center;align-items:center;';
    overlay.onclick = function() { overlay.remove(); };

    var box = document.createElement('div');
    box.style.cssText = 'background:#1c2128;border:2px solid #58a6ff;border-radius:8px;padding:20px;width:480px;max-width:90vw;color:#c9d1d9;font-size:13px;';
    box.onclick = function(e) { e.stopPropagation(); };

    box.innerHTML = '<h3 style="color:#58a6ff;font-size:16px;margin:0 0 12px">Добавить источник</h3>' +
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">' +
            '<button id="browseUpBtn" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;cursor:pointer;font-size:14px;padding:4px 8px">⬆</button>' +
            '<span id="browseCwd" style="color:#8b949e;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">/</span>' +
        '</div>' +
        '<div id="browseList" style="max-height:240px;overflow-y:auto;border:1px solid #30363d;border-radius:4px;background:#0d1117;margin-bottom:10px"></div>' +
        '<label style="display:block;color:#8b949e;font-size:11px;margin-bottom:3px">Псевдоним (необязательно)</label>' +
        '<input type="text" id="newRootAlias" placeholder="Фото" style="width:100%;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-family:monospace;font-size:12px;box-sizing:border-box">' +
        '<div style="margin-top:14px;display:flex;gap:8px">' +
            '<button id="addRootBtn" style="padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;background:#238636;color:#fff">Добавить и сканировать</button>' +
            '<button id="cancelRootBtn" style="padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;background:#21262d;color:#c9d1d9">Отмена</button>' +
        '</div>';

    overlay.appendChild(box);
    document.body.appendChild(overlay);

    _browsePath = '/';
    _selectedPath = '';
    document.getElementById('newRootAlias').value = '';
    browseDirs('/');

    document.getElementById('browseUpBtn').onclick = browseUp;
    document.getElementById('addRootBtn').onclick = addRoot;
    document.getElementById('cancelRootBtn').onclick = function() { overlay.remove(); };
}

function hideAddDialog() {
    var el = document.getElementById('addDialog');
    if (el) el.remove();
}

function browseDirs(path) {
    _browsePath = path;
    document.getElementById('browseCwd').textContent = path || '/';
    fetch(API + '/catalog/browse?path=' + encodeURIComponent(path)).then(function(r) { return r.json(); }).then(function(data) {
        var list = document.getElementById('browseList');
        list.innerHTML = '';
        var dirs = data.dirs || [];
        if (!dirs.length) {
            list.innerHTML = '<div style="padding:10px;color:#484f58;font-size:11px;">Папок нет</div>';
        }
        for (var i = 0; i < dirs.length; i++) {
            var d = dirs[i];
            var item = document.createElement('div');
            item.className = 'ad-dir-item';
            if (d.path === _selectedPath) item.classList.add('selected');
            item.setAttribute('data-path', d.path);
            item.innerHTML = '<span class="di-icon">📁</span>' + esc(d.name);
            item.onclick = (function(dp) { return function() {
                _selectedPath = dp;
                var items = document.querySelectorAll('.ad-dir-item');
                for (var j = 0; j < items.length; j++) items[j].classList.remove('selected');
                this.classList.add('selected');
                browseDirs(dp);
            }; })(d.path);
            list.appendChild(item);
        }
    });
}

function browseUp() {
    var parts = _browsePath.replace(/\/+$/, '').split('/');
    parts.pop();
    var parent = parts.join('/') || '/';
    _selectedPath = parent;
    browseDirs(parent);
}

function addRoot() {
    var path = _selectedPath || _browsePath;
    var alias = document.getElementById('newRootAlias').value.trim();
    if (!path || path === '/') {
        alert('Выберите папку');
        return;
    }
    var addBtn = document.getElementById('addRootBtn');
    addBtn.textContent = 'Добавление...';
    addBtn.disabled = true;
    fetch(API + '/catalog/add_root', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: path, alias: alias }),
    }).then(function(r) { return r.json(); }).then(function(res) {
        if (res.ok) {
            fetch(API + '/catalog/scan/' + res.root_id, { method: 'POST' });
            hideAddDialog();
            loadRoots();
        } else {
            alert('Ошибка: ' + (res.error || 'неизвестно'));
            addBtn.textContent = 'Добавить и сканировать';
            addBtn.disabled = false;
        }
    }).catch(function(e) {
        alert('Ошибка: ' + e.message);
        addBtn.textContent = 'Добавить и сканировать';
        addBtn.disabled = false;
    });
}

function deleteRoot(rootId, alias) {
    if (!confirm('Удалить источник "' + alias + '"? Фото из базы НЕ удаляются.')) return;
    fetch(API + '/catalog/root/' + rootId, { method: 'DELETE' }).then(function(r) { return r.json(); }).then(function() {
        if (currentRootId === rootId) { currentRootId = ''; currentPath = ''; }
        loadRoots();
    });
}

var _initCatalogDone = false;
function initCatalog() {
    if (_initCatalogDone) return;
    _initCatalogDone = true;
    var params = new URLSearchParams(window.location.search);
    var photoPath = params.get('photo') || '';
    if (!photoPath) return;

    fetch(API + '/catalog/locate?path=' + encodeURIComponent(photoPath)).then(function(r) { return r.json(); }).then(function(loc) {
        if (!loc.found) return;

        var rootId = loc.root_id;
        var targetPath = loc.parent_dir;
        var rootAlias = loc.root_alias;

        currentRootId = rootId;
        currentRootAlias = rootAlias;
        currentPath = targetPath;

        var rootItems = document.querySelectorAll('.root-menu-item');
        for (var ri = 0; ri < rootItems.length; ri++) {
            rootItems[ri].classList.remove('active');
            if (rootItems[ri].getAttribute('onclick') && rootItems[ri].getAttribute('onclick').indexOf(rootId) !== -1) {
                rootItems[ri].classList.add('active');
            }
        }

        renderBreadcrumb();

        var segments = targetPath ? targetPath.split('/') : [];

        loadTreeAndContent(rootId, '', function() {
            function expandSegment(idx) {
                if (idx >= segments.length) {
                    loadContentOnly(rootId, targetPath, 9999, function() {
                        highlightPhoto(photoPath);
                    });
                    return;
                }
                var segPath = segments.slice(0, idx + 1).join('/');
                var item = null;
                var items = document.querySelectorAll('.t-item[data-path]');
                for (var ti = 0; ti < items.length; ti++) {
                    if (items[ti].getAttribute('data-path') === segPath) { item = items[ti]; break; }
                }
                if (!item) { loadContentOnly(rootId, targetPath, 9999, function() { highlightPhoto(photoPath); }); return; }
                item.classList.add('active');
                var arrow = item.querySelector('.t-arrow');
                var child = item.nextElementSibling;
                if (arrow && child && child.classList.contains('t-children')) {
                    toggleTreeFolder(rootId, segPath, child.id, arrow, function() {
                        expandSegment(idx + 1);
                    });
                } else {
                    expandSegment(idx + 1);
                }
            }
            expandSegment(0);
        });
    });
}

function highlightPhoto(photoPath) {
    var fname = photoPath.split('/').pop();
    function tryHighlight() {
        var cards = document.querySelectorAll('.photo-card');
        for (var ci = 0; ci < cards.length; ci++) {
            var nameEl = cards[ci].querySelector('.p-name');
            if (nameEl && nameEl.textContent === fname) {
                cards[ci].scrollIntoView({ block: 'center' });
                cards[ci].style.outline = '2px solid #58a6ff';
                cards[ci].style.outlineOffset = '2px';
                (function(c) { setTimeout(function() { c.style.outline = ''; }, 5000); })(cards[ci]);
                showPhotoDetail(ci);
                return true;
            }
        }
        return false;
    }
    if (!tryHighlight()) setTimeout(tryHighlight, 500);
}

function loadRoots() {
    fetch(API + '/catalog/roots').then(function(r) { return r.json(); }).then(function(roots) {
        rootsData = roots;
        var html = '';
        for (var i = 0; i < roots.length; i++) {
            var r = roots[i];
            var total = r.file_count || 0;
            var pct = total > 0 ? Math.round(r.described / total * 100) : 0;
            var en = r.enabled !== false && r.enabled !== 0;
            html += '<div class="root-menu-item' + (en ? '' : ' disabled') + '" onclick="' + (en ? "selectRoot('" + r.root_id + "','" + esc(r.alias) + "')" : '') + '" oncontextmenu="event.preventDefault();deleteRoot(\'' + r.root_id + '\',\'' + esc(r.alias) + '\')">';
            html += '<input type="checkbox" class="rm-check" ' + (en ? 'checked' : '') + ' onclick="event.stopPropagation();toggleRoot(\'' + r.root_id + '\')" title="Вкл/Выкл индексацию">';
            html += '<div class="rm-info">';
            html += '<div class="rm-alias">' + esc(r.alias) + '</div>';
            html += '<div class="rm-path">' + esc(r.root_path) + '</div>';
            html += '</div>';
            html += '</div>';
            html += '<div class="t-children" id="rtree_' + r.root_id + '"></div>';
        }
        if (roots.length === 0) {
            html += '<div style="color:#484f58;font-size:11px;padding:12px">Нет источников. Нажмите + чтобы добавить.</div>';
        }
        document.getElementById('sidebarTree').innerHTML = html;
        initCatalog();
    }).catch(function() {
        document.getElementById('sidebarTree').innerHTML = '<div class="loading">Ошибка</div>';
    });
}

function toggleRoot(rootId) {
    fetch(API + '/catalog/root/' + rootId + '/toggle', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(res) {
        if (res.ok) loadRoots();
    });
}

function selectRoot(rootId, alias) {
    currentRootId = rootId;
    currentRootAlias = alias;
    currentPath = '';
    renderBreadcrumb();
    loadTreeAndContent(rootId, '');
}

function loadTreeAndContent(rootId, path, callback) {
    var treeEl = document.getElementById('rtree_' + rootId);
    if (!treeEl) return;

    treeEl.classList.add('open');
    treeEl.innerHTML = '<div class="t-loading">Загрузка...</div>';

    fetch(API + '/catalog/tree?root_id=' + rootId + '&path=' + encodeURIComponent(path)).then(function(r) { return r.json(); }).then(function(tree) {
        var html = '';

        if (tree.subdirs && tree.subdirs.length > 0) {
            for (var i = 0; i < tree.subdirs.length; i++) {
                var d = tree.subdirs[i];
                var dname = typeof d === 'string' ? d : d.name;
                var total = (typeof d === 'object' && d.total) ? d.total : 0;
                var pctDone = (typeof d === 'object' && d.pct_done) ? d.pct_done : 0;
                var fullId = rootId + '_' + path.replace(/[^a-zA-Z0-9]/g, '_') + '_' + i;
                var fullPath = path ? (path + '/' + dname) : dname;

                html += '<div class="t-item' + (fullPath === currentPath ? ' active' : '') + '" data-path="' + esc(fullPath) + '" onclick="navigateFolder(\'' + rootId + '\',\'' + esc(fullPath) + '\',this)">';
                html += '<span class="t-arrow" onclick="event.stopPropagation();toggleTreeFolder(\'' + rootId + '\',\'' + esc(fullPath) + '\',\'' + fullId + '\',this)">&#9654;</span>';
                html += '<span class="t-icon">&#128193;</span>';
                html += '<span class="t-name">' + esc(dname) + '</span>';
                if (total > 0) html += '<span class="t-count">' + total + '</span>';
                html += '</div>';
                html += '<div class="t-children" id="' + fullId + '"></div>';
            }
        }

        treeEl.innerHTML = html;
        renderContent(tree);
        if (callback) callback();
    }).catch(function() {
        treeEl.innerHTML = '<div class="t-loading">Ошибка</div>';
    });
}

function toggleTreeFolder(rootId, path, childrenId, arrowEl, callback) {
    var children = document.getElementById(childrenId);
    if (!children) return;
    if (children.classList.contains('open')) {
        children.classList.remove('open');
        children.innerHTML = '';
        if (arrowEl) arrowEl.classList.remove('open');
        if (callback) callback();
        return;
    }
    if (arrowEl) arrowEl.classList.add('open');
    loadSubTree(rootId, path, childrenId, callback);
}

function loadSubTree(rootId, path, childrenId, callback) {
    var el = document.getElementById(childrenId);
    if (!el) return;
    el.classList.add('open');
    el.innerHTML = '<div class="t-loading">Загрузка...</div>';

    fetch(API + '/catalog/tree?root_id=' + rootId + '&path=' + encodeURIComponent(path)).then(function(r) { return r.json(); }).then(function(tree) {
        var html = '';
        if (tree.subdirs && tree.subdirs.length > 0) {
            for (var i = 0; i < tree.subdirs.length; i++) {
                var d = tree.subdirs[i];
                var dname = typeof d === 'string' ? d : d.name;
                var total = (typeof d === 'object' && d.total) ? d.total : 0;
                var fullId = childrenId + '_' + i;
                var fullPath = path ? (path + '/' + dname) : dname;

                html += '<div class="t-item' + (fullPath === currentPath ? ' active' : '') + '" data-path="' + esc(fullPath) + '" onclick="navigateFolder(\'' + rootId + '\',\'' + esc(fullPath) + '\',this)">';
                html += '<span class="t-arrow" onclick="event.stopPropagation();toggleTreeFolder(\'' + rootId + '\',\'' + esc(fullPath) + '\',\'' + fullId + '\',this)">&#9654;</span>';
                html += '<span class="t-icon">&#128193;</span>';
                html += '<span class="t-name">' + esc(dname) + '</span>';
                if (total > 0) html += '<span class="t-count">' + total + '</span>';
                html += '</div>';
                html += '<div class="t-children" id="' + fullId + '"></div>';
            }
        }
        el.innerHTML = html;
        if (callback) callback();
    }).catch(function() {
        el.innerHTML = '<div class="t-loading">Ошибка</div>';
    });
}

function navigateFolder(rootId, path, el) {
    currentRootId = rootId;
    currentPath = path;
    renderBreadcrumb();

    document.querySelectorAll('.t-item.active').forEach(function(e) { e.classList.remove('active'); });
    if (el) el.classList.add('active');

    loadContentOnly(rootId, path);
    showFolderDetail(rootId, path);
}

var _dpHandleAdded = false;
function openDetailPanel() {
    document.getElementById('detailPanelWrap').classList.add('open');
    if (!_dpHandleAdded && _isMobile()) {
        var dp = document.getElementById('detailPanel');
        if (dp && !dp.querySelector('.dp-handle')) {
            var handle = document.createElement('div');
            handle.className = 'dp-handle';
            dp.insertBefore(handle, dp.firstChild);
            _dpHandleAdded = true;
        }
    }
}

function closeDetailPanel() {
    document.getElementById('detailPanelWrap').classList.remove('open');
}

function showFolderDetail(rootId, path) {
    openDetailPanel();
    document.getElementById('detailPanelTitle').textContent = 'Папка';
    var body = document.getElementById('detailPanelBody');
    var parts = path ? path.split('/') : [];
    var folderName = parts.length ? parts[parts.length - 1] : currentRootAlias || 'Корень';
    var html = '<div class="dp-label">Имя</div><div class="dp-value">' + esc(folderName) + '</div>';
    html += '<div class="dp-label">Путь</div><div class="dp-value">' + esc(path || '/') + '</div>';
    html += '<div class="dp-label">Источник</div><div class="dp-value">' + esc(currentRootAlias) + '</div>';
    body.innerHTML = html;
}

function showPhotoDetail(idx) {
    var f = catalogFiles[idx];
    if (!f) return;
    openDetailPanel();
    document.getElementById('detailPanelTitle').textContent = 'Фото';
    var body = document.getElementById('detailPanelBody');
    var fname = (f.rel_path || '').split('/').pop();
    var thumbUrl = '';
    if (f.abs_path) {
        thumbUrl = API + '/photos/thumbnail?abs_path=' + encodeURIComponent(f.abs_path) + '&size=md';
    } else if (f.rel_path) {
        thumbUrl = API + '/photos/thumbnail?path=' + encodeURIComponent(f.rel_path) + '&size=md';
    }
    var html = '';
    if (thumbUrl) html += '<img src="' + thumbUrl + '" style="width:100%;border-radius:6px;margin-bottom:12px" loading="lazy" onerror="this.style.display=\'none\'">';
    html += '<div class="dp-label">Имя файла</div><div class="dp-value">' + esc(fname) + '</div>';
    html += '<div class="dp-label">Размер</div><div class="dp-value">' + fmtSize(f.file_size) + '</div>';
    html += '<div class="dp-label">Путь</div><div class="dp-value">' + esc(f.rel_path || '') + '</div>';
    html += '<div class="dp-label">Семантическая индексация</div><div class="dp-value">' + (f.ingested ? 'да' : '<span class="empty">нет</span>') + '</div>';
    html += '<div class="dp-label">Описание</div><div class="dp-value' + (f.described ? '' : ' empty') + '">' + (f.described ? esc(f.description || 'да') : 'нет') + '</div>';
    html += '<div class="dp-label">EXIF</div><div class="dp-value">' + (f.exif_done ? 'да' : '<span class="empty">нет</span>') + '</div>';
    html += '<div class="dp-label">Лица</div><div class="dp-value">' + (f.faces_done ? 'да' : '<span class="empty">нет</span>') + '</div>';
    body.innerHTML = html;
}

function loadContentOnly(rootId, path, limit, callback) {
    var grid = document.getElementById('contentGrid');
    var info = document.getElementById('infoLine');
    grid.innerHTML = '<div class="loading">Загрузка...</div>';

    var l = limit || 200;
    fetch(API + '/catalog/tree?root_id=' + rootId + '&path=' + encodeURIComponent(path) + '&limit=' + l).then(function(r) { return r.json(); }).then(function(tree) {
        renderContent(tree);
        if (callback) callback();
    }).catch(function() {
        grid.innerHTML = '<div class="empty-msg">Ошибка загрузки</div>';
    });
}

function renderContent(tree) {
    var grid = document.getElementById('contentGrid');
    var info = document.getElementById('infoLine');
    var html = '';

    var dirCount = (tree.subdirs && tree.subdirs.length) || 0;
    var fileCount = tree.total_files || ((tree.files && tree.files.length) || 0);

    if (dirCount > 0) {
        for (var i = 0; i < tree.subdirs.length; i++) {
            var d = tree.subdirs[i];
            var dname = typeof d === 'string' ? d : d.name;
            var total = (typeof d === 'object' && d.total) ? d.total : 0;
            var pctDone = (typeof d === 'object' && d.pct_done) ? d.pct_done : 0;
            var fullPath = currentPath ? (currentPath + '/' + dname) : dname;

            html += '<div class="folder-card" onclick="navigateFolder(\'' + currentRootId + '\',\'' + esc(fullPath) + '\')">';
            html += '<span class="f-icon">&#128193;</span>';
            html += '<div class="f-info">';
            html += '<div class="f-name" title="' + esc(dname) + '">' + esc(dname) + '</div>';
            html += '<div class="f-count">' + total + ' фото</div>';
            if (total > 0 && pctDone > 0) {
                html += '<div class="f-bar"><div class="f-bar-fill" style="width:' + pctDone + '%"></div></div>';
            }
            html += '</div></div>';
        }
    }

    if (tree.files && tree.files.length > 0) {
        catalogFiles = tree.files;
        for (var i = 0; i < tree.files.length; i++) {
            var f = tree.files[i];
            var fname = (f.rel_path || '').split('/').pop();
            var thumbUrl = '';
            if (f.abs_path) {
                thumbUrl = API + '/photos/thumbnail?abs_path=' + encodeURIComponent(f.abs_path) + '&size=sm';
            } else if (f.rel_path) {
                thumbUrl = API + '/photos/thumbnail?path=' + encodeURIComponent(f.rel_path) + '&size=sm';
            }

            html += '<div class="photo-card" onclick="showPhotoDetail(' + i + ')" ondblclick="openPhoto(' + i + ')">';
            html += '<img src="' + thumbUrl + '" loading="lazy" onerror="this.style.display=\'none\'">';
            html += '<div class="p-name" title="' + esc(fname) + '">' + esc(fname) + '</div>';
            html += '<div class="p-size">' + fmtSize(f.file_size) + '</div>';
            html += '<div class="p-badges">';
            if (f.described) html += '<span class="badge-ok" title="Описано">D</span>';
            if (f.faces_done) html += '<span class="badge-ok" title="Лица">F</span>';
            if (f.exif_done) html += '<span class="badge-ok" title="EXIF">E</span>';
            if (f.ingested) html += '<span class="badge-ok" title="В базе">I</span>';
            html += '</div>';
            html += '</div>';
        }
    }

    if (!dirCount && (!tree.files || !tree.files.length)) {
        html += '<div class="empty-msg">Папка пуста</div>';
    }

    grid.innerHTML = html;

    var infoText = '';
    if (dirCount) infoText += dirCount + ' папок';
    if (dirCount && fileCount) infoText += ', ';
    if (fileCount) infoText += fileCount + ' фото';
    if (!dirCount && !fileCount) infoText = '—';
    info.innerHTML = '<span>' + infoText + '</span><span>' + esc(currentRootAlias) + (currentPath ? ': ' + currentPath : '') + '</span>';
}

function renderBreadcrumb() {
    var bar = document.getElementById('breadcrumb');
    if (!currentRootId) {
        bar.innerHTML = '<span class="bc-item current">Выберите источник</span>';
        return;
    }
    var html = '<span class="bc-item" onclick="navigateFolder(\'' + currentRootId + '\',\'\')">' + esc(currentRootAlias) + '</span>';
    if (currentPath) {
        var parts = currentPath.split('/');
        var built = '';
        for (var i = 0; i < parts.length; i++) {
            built += (i > 0 ? '/' : '') + parts[i];
            var isLast = i === parts.length - 1;
            var cls = isLast ? 'bc-item current' : 'bc-item';
            var p = built;
            html += '<span class="bc-sep">/</span>';
            html += '<span class="' + cls + '" onclick="navigateFolder(\'' + currentRootId + '\',\'' + esc(p) + '\')">' + esc(parts[i]) + '</span>';
        }
    }
    bar.innerHTML = html;
}

function openPhoto(idx) {
    if (idx < 0 || idx >= catalogFiles.length) return;
    _mIdx = idx;
    showPhotoDetail(idx);
    var f = catalogFiles[idx];
    var url = f.rel_path ? (API + '/photos/?path=' + encodeURIComponent(f.rel_path)) : '';
    var img = document.getElementById('photoModalImg');
    img.src = url;
    var wrap = document.getElementById('modalImgWrap');
    wrap.style.transform = '';
    _mZoom = 1; _mPx = 0; _mPy = 0;
    document.getElementById('photoModal').classList.add('show');
    _drawFaceBoxes(f, img);
}

function closePhotoModal() {
    document.getElementById('photoModal').classList.remove('show');
    document.getElementById('photoModalImg').src = '';
    _mIdx = -1;
    _clearFaceBoxes();
    document.getElementById('photoModal').classList.remove('fs');
}

function modalNav(dir) {
    var idx = _mIdx + dir;
    if (idx < 0 || idx >= catalogFiles.length) return;
    openPhoto(idx);
}

function toggleFs() {
    var el = document.getElementById('photoModal');
    el.classList.toggle('fs');
}

function applyModalTransform() {
    document.getElementById('modalImgWrap').style.transform = 'translate(' + _mPx + 'px,' + _mPy + 'px) scale(' + _mZoom + ')';
    var boxes = document.querySelectorAll('.face-box');
    for (var i = 0; i < boxes.length; i++) {
        boxes[i].style.borderWidth = (2 / _mZoom) + 'px';
        var lbl = boxes[i].querySelector('.face-box-label');
        if (lbl) lbl.style.fontSize = (13 / _mZoom) + 'px';
    }
}

function _drawFaceBoxes(f, img) {
    var ov = document.getElementById('faceOverlays');
    ov.innerHTML = '';
    var faces = f.faces || [];
    if (!faces.length) return;
    function doDraw() {
        var dispW = img.clientWidth, dispH = img.clientHeight;
        if (!dispW || !dispH) return;
        var natW = img.naturalWidth || f.img_width || 1;
        var natH = img.naturalHeight || f.img_height || 1;
        var scaleX = dispW / natW, scaleY = dispH / natH;
        var html = '';
        for (var i = 0; i < faces.length; i++) {
            var fc = faces[i];
            if (fc.bbox_x1 == null) continue;
            var x1 = fc.bbox_x1 * scaleX, y1 = fc.bbox_y1 * scaleY;
            var x2 = fc.bbox_x2 * scaleX, y2 = fc.bbox_y2 * scaleY;
            var name = fc.display_name || fc.name || '';
            html += '<div class="face-box" style="left:' + x1 + 'px;top:' + y1 + 'px;width:' + (x2-x1) + 'px;height:' + (y2-y1) + 'px">';
            if (name) html += '<div class="face-box-label">' + esc(name) + '</div>';
            html += '</div>';
        }
        ov.innerHTML = html;
    }
    if (img.complete && img.naturalWidth) { doDraw(); } else { img.onload = doDraw; }
}

function _clearFaceBoxes() { document.getElementById('faceOverlays').innerHTML = ''; }

document.getElementById('photoModal').addEventListener('click', function(e) {
    if (e.target === this) closePhotoModal();
});
document.getElementById('photoModal').addEventListener('wheel', function(e) {
    e.preventDefault();
    var rect = document.getElementById('modalImgWrap').getBoundingClientRect();
    var cx = e.clientX - rect.left - rect.width / 2 - _mPx;
    var cy = e.clientY - rect.top - rect.height / 2 - _mPy;
    var oldZ = _mZoom;
    var delta = e.deltaY > 0 ? 0.8 : 1.25;
    _mZoom = Math.max(1, Math.min(20, _mZoom * delta));
    var ratio = _mZoom / oldZ;
    _mPx -= cx * (ratio - 1);
    _mPy -= cy * (ratio - 1);
    if (_mZoom <= 1) { _mPx = 0; _mPy = 0; }
    applyModalTransform();
});
document.getElementById('modalImgWrap').addEventListener('mousedown', function(e) {
    if (_mZoom > 1) { e.preventDefault(); _mDrag = true; _mDX = e.clientX - _mPx; _mDY = e.clientY - _mPy; e.currentTarget.style.cursor = 'grabbing'; }
});
document.addEventListener('mousemove', function(e) {
    if (_mDrag) { _mPx = e.clientX - _mDX; _mPy = e.clientY - _mDY; applyModalTransform(); }
});
document.addEventListener('mouseup', function() {
    if (_mDrag) { _mDrag = false; document.getElementById('modalImgWrap').style.cursor = 'grab'; }
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePhotoModal();
    if (e.key === 'ArrowLeft') modalNav(-1);
    if (e.key === 'ArrowRight') modalNav(1);
});
document.addEventListener('fullscreenchange', function() {
    if (!document.fullscreenElement) document.getElementById('photoModal').classList.remove('fs');
});

(function() {
    var modal = document.getElementById('photoModal');
    var sx = 0, sy = 0, st = 0;
    var pinchStartDist = 0, pinchStartZoom = 1;
    var panStartX = 0, panStartY = 0, isPanning = false;

    modal.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
            pinchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            pinchStartZoom = _mZoom;
            return;
        }
        if (e.touches.length === 1) {
            sx = e.touches[0].clientX; sy = e.touches[0].clientY; st = Date.now();
            if (_mZoom > 1) {
                isPanning = true;
                panStartX = e.touches[0].clientX - _mPx;
                panStartY = e.touches[0].clientY - _mPy;
            }
        }
    }, { passive: true });

    modal.addEventListener('touchmove', function(e) {
        if (e.touches.length === 2 && pinchStartDist > 0) {
            var dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            var scale = dist / pinchStartDist;
            _mZoom = Math.max(1, Math.min(20, pinchStartZoom * scale));
            if (_mZoom <= 1) { _mPx = 0; _mPy = 0; }
            applyModalTransform();
            return;
        }
        if (isPanning && e.touches.length === 1) {
            _mPx = e.touches[0].clientX - panStartX;
            _mPy = e.touches[0].clientY - panStartY;
            applyModalTransform();
        }
    }, { passive: true });

    modal.addEventListener('touchend', function(e) {
        isPanning = false;
        pinchStartDist = 0;
        if (e.touches.length > 0) return;
        if (_mZoom > 1) return;
        var dx = e.changedTouches[0].clientX - sx;
        var dy = e.changedTouches[0].clientY - sy;
        var dt = Date.now() - st;
        if (dt < 500 && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
            if (dx < 0) modalNav(1);
            else modalNav(-1);
        }
    }, { passive: true });
})();

function _isMobile() { return window.innerWidth <= 768; }

(function() {
    var dp = document.getElementById('detailPanelWrap');
    var dpStartY = 0, dpCurY = 0, dpDragging = false;
    dp.addEventListener('touchstart', function(e) {
        var t = e.touches[0];
        if (t.clientY < dp.getBoundingClientRect().top + 40) {
            dpDragging = true;
            dpStartY = t.clientY;
            dp.style.transition = 'none';
        }
    }, { passive: true });
    dp.addEventListener('touchmove', function(e) {
        if (!dpDragging) return;
        var dy = e.touches[0].clientY - dpStartY;
        if (dy > 0) {
            dpCurY = dy;
            dp.style.transform = 'translateY(' + dy + 'px)';
        }
    }, { passive: true });
    dp.addEventListener('touchend', function() {
        if (!dpDragging) return;
        dpDragging = false;
        dp.style.transition = '';
        dp.style.transform = '';
        if (dpCurY > 80) closeDetailPanel();
        dpCurY = 0;
    }, { passive: true });
})();

loadRoots();

var _isLightTheme = false;
function toggleTheme() {
    _isLightTheme = !_isLightTheme;
    document.body.classList.toggle('light-theme', _isLightTheme);
    localStorage.setItem('gallery-theme', _isLightTheme ? 'light' : 'dark');
    var logo = document.querySelector('h1 .logo');
    if (logo) logo.src = _isLightTheme ? logo.dataset.light : logo.dataset.dark;
    updateThemeIcon();
}
function updateThemeIcon() {
    var btn = document.querySelector('.theme-toggle');
    if (btn) {
        btn.innerHTML = _isLightTheme ? '\u263E' : '\u2600';
        btn.title = _isLightTheme ? 'Тёмная тема' : 'Дневная тема';
    }
}
(function() {
    var savedTheme = localStorage.getItem('gallery-theme');
    if (savedTheme === 'light') {
        _isLightTheme = true;
        var logo = document.querySelector("h1 .logo");
        if (logo) logo.src = logo.dataset.light;
        document.body.classList.add('light-theme');
    }
    updateThemeIcon();
})();
function openMobileNav() {
    var p = document.getElementById('mmPanel');
    p.classList.remove('dragging');
    p.style.transform = '';
    p.classList.add('open');
    document.getElementById('mmOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    updateMmTheme();
}
function closeMobileNav() {
    var p = document.getElementById('mmPanel');
    p.classList.remove('dragging');
    p.style.transform = '';
    p.classList.remove('open');
    document.getElementById('mmOverlay').classList.remove('open');
    document.body.style.overflow = '';
}
function toggleMobileNav() {
    var p = document.getElementById('mmPanel');
    if (p.classList.contains('open')) closeMobileNav(); else openMobileNav();
}
function updateMmTheme() {
    var ico = document.getElementById('mmThemeIco');
    var lbl = document.getElementById('mmThemeLbl');
    if (ico) ico.innerHTML = _isLightTheme ? '\u263E' : '\u2600';
    if (lbl) lbl.textContent = _isLightTheme ? 'Тёмная тема' : 'Дневная тема';
    var mmLogo = document.querySelector('.mm-head img');
    if (mmLogo) mmLogo.src = _isLightTheme ? mmLogo.dataset.light : mmLogo.dataset.dark;
}
document.getElementById('mmOverlay').addEventListener('click', closeMobileNav);

(function() {
    var panel = document.getElementById('mmPanel');
    var edge = document.getElementById('mmEdge');
    var startX = 0, startY = 0, curX = 0, isEdgeSwipe = false, isPanelSwipe = false, panelOpen = false;
    var W = 280;

    function onOpen() { panelOpen = true; }
    function onClose() { panelOpen = false; }

    var origOpen = openMobileNav;
    openMobileNav = function() { origOpen(); onOpen(); };
    var origClose = closeMobileNav;
    closeMobileNav = function() { origClose(); onClose(); };

    document.addEventListener('touchstart', function(e) {
        var t = e.touches[0];
        startX = t.clientX;
        startY = t.clientY;
        curX = startX;
        isEdgeSwipe = false;
        isPanelSwipe = false;

        if (!panelOpen && startX >= window.innerWidth - 30) {
            isEdgeSwipe = true;
            panel.classList.add('dragging');
        }
        if (panelOpen && panel.contains(e.target)) {
            isPanelSwipe = true;
            panel.classList.add('dragging');
        }
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
        if (!isEdgeSwipe && !isPanelSwipe) return;
        var t = e.touches[0];
        curX = t.clientX;
        var dx = curX - startX;
        var dy = t.clientY - startY;
        if (Math.abs(dy) > Math.abs(dx) * 1.5) { isEdgeSwipe = false; isPanelSwipe = false; panel.classList.remove('dragging'); panel.style.transform = ''; return; }

        if (isEdgeSwipe) {
            var tx = Math.max(0, -dx);
            if (tx > 0) {
                panel.classList.add('open');
                document.getElementById('mmOverlay').classList.add('open');
                var pct = Math.min(1, tx / W);
                panel.style.transform = 'translateX(' + (100 - pct * 100) + '%)';
                document.getElementById('mmOverlay').style.opacity = pct * 0.5;
            }
        }
        if (isPanelSwipe) {
            var tx = Math.min(0, -dx);
            var pct = Math.min(1, Math.abs(tx) / W);
            panel.style.transform = 'translateX(' + (-pct * 100) + '%)';
            document.getElementById('mmOverlay').style.opacity = (1 - pct) * 0.5;
        }
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
        if (!isEdgeSwipe && !isPanelSwipe) return;
        panel.classList.remove('dragging');
        panel.style.transform = '';
        var overlay = document.getElementById('mmOverlay');
        overlay.style.opacity = '';

        var dx = curX - startX;
        if (isEdgeSwipe) {
            if (dx < -60) { openMobileNav(); }
            else { panel.classList.remove('open'); overlay.classList.remove('open'); }
        }
        if (isPanelSwipe) {
            if (dx > 60) { closeMobileNav(); }
            else { panel.classList.add('open'); }
        }
        isEdgeSwipe = false;
        isPanelSwipe = false;
    }, { passive: true });
})();
function toggleMobileSidebar() {
    var wrap = document.getElementById('sidebarWrap');
    var overlay = document.getElementById('sidebarOverlay');
    if (wrap) wrap.classList.toggle('mob-open');
    if (overlay) overlay.classList.toggle('mob-open');
}
